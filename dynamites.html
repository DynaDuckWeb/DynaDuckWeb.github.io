<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamites - DynaDuck</title>

<link rel="stylesheet" href="style.css">

<style>
  
body {
  margin:0;
  font-family:Poppins,sans-serif;
  background:#f2f2f2;
  color:#222;
}

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#333;
  padding:15px 40px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.logo{
  height:70px;
  cursor:pointer;
}

nav{
  display:flex;
  gap:25px;
}

nav a{
  text-decoration:none;
  color:white;
  font-weight:600;
  transition:0.2s;
}

nav a:hover{
  color:#11AD36;
}

.search-container{
  flex:1;
  display:flex;
  justify-content:center;
}

.search-bar{
  width:320px;
  padding:10px 12px;
  border-radius:8px;
  border:none;
  outline:none;
  font-size:1em;
}

.green-btn{
  background:#11AD36;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

.green-btn:hover{
  background:#0d8d2b;
}

#authButtons{
  display:flex;
  gap:12px;
  align-items:center;
}

.dynamites-page { 
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
}

.dynamites-top{
  margin-bottom:35px;
}

.dynamites-top h1{
  margin:0;
  font-size:2.5em;
}

.dynamites-top p{
  color:#666;
  margin-top:8px;
}

.dynamites-grid{
  display:flex;
  gap:25px;
  flex-wrap:wrap;
}

.dynamite-card{
  width:320px;
  background:white;
  border-radius:16px;
  overflow:hidden;
  border:1px solid #ddd;
  box-shadow:0 3px 12px rgba(0,0,0,0.08);
  transition:0.2s;
}

.dynamite-card:hover{
  transform:translateY(-5px);
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

.dynamite-image{
  height:240px;
  background:#f7f7f7;
  display:flex;
  align-items:center;
  justify-content:center;
}

.dynamite-image img{
  width:450px;
  height:450px;
  object-fit:contain;
  position:relative;
  top:25px;
}

.dynamite-content{
  padding:20px;
}

.dynamite-content h2{
  margin:0;
  font-size:1.5em;
}

.dynamite-price{
  color:#11AD36;
  font-weight:bold;
  font-size:1.3em;
  margin-top:10px;
  margin-bottom:20px;
}

.buy-btn{
  width:100%;
  border:none;
  background:#11AD36;
  color:white;
  padding:14px;
  border-radius:10px;
  font-size:1em;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.buy-btn:hover{
  background:#0d8d2b;
}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="index.html">
      <img src="logo.png" class="logo" alt="Logo">
    </a>
    <nav>
      <a href="catalog.html">Catalog</a>
      <a href="ideas.html">Ideas</a>
      <a href="create.html">Create</a>
      <a href="dynamites.html">Dynamites</a>
    </nav>
  </div>
  <div class="search-container">
    <input type="text" class="search-bar" placeholder="Search...">
  </div>
  <div id="authButtons"></div>
</header>
<main class="dynamites-page">
<div class="dynamites-top">
  <div class="top-row">
    <div>
      <h1>Dynamites</h1>
      <p>Buy those stuff so you can look goodie 💥</p>
    </div>
    <div class="balance-box">
      <span>Your Balance</span>
      <h2 id="dynamiteBalance">0</h2>
    </div>
  </div>
</div>
  <div class="dynamites-grid">
    <div class="dynamite-card">
      <div class="dynamite-image">
        <img src="dynamites_new_explosion.png">
      </div>
      <div class="dynamite-content">
        <h2>200 Dynamites</h2>
        <div class="dynamite-price">
          $2.99
        </div>
        <button class="buy-btn" onclick="buyDynamites(200)">
          Buy
        </button>
      </div>
    </div>
    <div class="dynamite-card">
      <div class="dynamite-image">
        <img src="dynamites_new_explosion.png">
      </div>
      <div class="dynamite-content">
        <h2>800 Dynamites</h2>
        <div class="dynamite-price">
          $7.99
        </div>
        <button class="buy-btn" onclick="buyDynamites(800)">
          Buy
        </button>
      </div>
    </div>
    <div class="dynamite-card">
      <div class="dynamite-image">
        <img src="dynamites_new_explosion.png">
      </div>
      <div class="dynamite-content">
        <h2>2000 Dynamites</h2>
        <div class="dynamite-price">
          $14.99
        </div>
        <button class="buy-btn" onclick="buyDynamites(2000)">
          Buy
        </button>
      </div>
    </div>
  </div>
</main>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
  authDomain: "dynaduck-19dbb.firebaseapp.com",
  databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dynaduck-19dbb",
  storageBucket: "dynaduck-19dbb.firebasestorage.app",
  messagingSenderId: "777148453502",
  appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
};
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();
const currentUser =
  localStorage.getItem("loggedInUser");
function loadBalance(){

  if(!currentUser){

    document.getElementById(
      "dynamiteBalance"
    ).innerText = "0";

    return;
  }
  const balanceRef =
    db.ref("users/" + currentUser + "/dynamites");
  balanceRef.on("value", snapshot => {
    let balance = snapshot.val();
    if(balance == null){
      balance = 0;
      balanceRef.set(0);
    }
    document.getElementById(
      "dynamiteBalance"
    ).innerText = balance;
  });

}
function buyDynamites(amount){
  if(!currentUser){
    alert("Please log in first.");
    return;
  }
  const balanceRef =
    db.ref("users/" + currentUser + "/dynamites");
  balanceRef.once("value").then(snapshot => {
    let currentBalance = snapshot.val();
    if(currentBalance == null)
      currentBalance = 0;
    const newBalance =
      currentBalance + amount;
    balanceRef.set(newBalance).then(() => {
      alert(
        "You bought " +
        amount +
        " Dynamites!"
      );
    });
  });
}
function updateHeader(){
  const authDiv =
    document.getElementById("authButtons");
  if(currentUser){
    authDiv.innerHTML = `
      <span style="
        color:white;
        font-weight:bold;
        margin-right:10px;
      ">
        Welcome, ${currentUser}!
      </span>
      <a href="settings.html">
        <button class="green-btn">
          Settings
        </button>
      </a>
      <button
        class="green-btn"
        onclick="logout()"
      >
        Logout
      </button>
    `;
  } else {
    authDiv.innerHTML = `
      <a href="signup.html">
        <button class="green-btn">
          Sign Up
        </button>
      </a>
      <a href="login.html">
        <button class="green-btn">
          Log In
        </button>
      </a>
    `;
  }
}
function logout(){
  localStorage.removeItem(
    "loggedInUser"
  );
  location.reload();
}
window.addEventListener(
  "DOMContentLoaded",
  () => {
    updateHeader();
    loadBalance();
  }
);
</script>
</body>
</html>
