<!-- SIMPLE DYNAMITES SHOP -->

<div class="shop-grid">

  <!-- STARTER -->
  <div class="shop-card">

    <div class="card-image">
      <img src="dynamites_new_explosion.png">

      <button class="buy-overlay" onclick="buyDynamites(100)">
        BUY
      </button>
    </div>

    <div class="shop-info">
      <h2>100 Dynamites</h2>
      <p class="price-text">Starter Pack</p>
    </div>

  </div>

  <!-- POPULAR -->
  <div class="shop-card featured-card">

    <div class="popular-tag">
      MOST POPULAR
    </div>

    <div class="card-image">
      <img src="dynamites_new_explosion.png">

      <button class="buy-overlay" onclick="buyDynamites(500)">
        BUY
      </button>
    </div>

    <div class="shop-info">
      <h2>500 Dynamites</h2>
      <p class="price-text">Best Value</p>
    </div>

  </div>

  <!-- MEGA -->
  <div class="shop-card">

    <div class="card-image">
      <img src="dynamites_new_explosion.png">

      <button class="buy-overlay" onclick="buyDynamites(1000)">
        BUY
      </button>
    </div>

    <div class="shop-info">
      <h2>1000 Dynamites</h2>
      <p class="price-text">Mega Pack</p>
    </div>

  </div>

</div>
