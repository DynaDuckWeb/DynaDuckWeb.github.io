<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamites - DynaDuck</title>

<link rel="stylesheet" href="style.css">

<style>

/* PAGE */

main{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
}

.shop-title{
  font-size:2.2em;
  margin-bottom:10px;
}

.balance-text{
  color:#11AD36;
  font-size:1.5em;
  font-weight:bold;
  margin-bottom:40px;
}

/* SHOP */

.shop-grid{
  display:flex;
  justify-content:center;
  gap:35px;
  flex-wrap:wrap;
}

/* CARD */

.dynamite-card{
  width:220px;
  background:white;
  border:6px solid #111;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
  transition:0.2s;
}

.dynamite-card:hover{
  transform:translateY(-5px);
}

.dynamite-card img{
  width:180px;
  height:180px;
  object-fit:contain;
  margin-bottom:15px;
}

.card-image img{
  width:80%;
}

/* BUY BUTTON */

.buy-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  border:none;
  background:#11AD36;
  color:white;
  padding:14px;
  font-size:1.2em;
  font-weight:bold;
  cursor:pointer;
}

.buy-overlay:hover{
  background:#0d8f2b;
}

/* INFO */

.card-info{
  padding:15px;
  text-align:center;
}

.card-info h2{
  margin:0;
  font-size:2em;
}

.card-info p{
  margin-top:5px;
  color:#555;
}

</style>
</head>

<body>

<header>
  <div class="header-left">

    <a href="index.html">
      <img src="logo.png" class="logo" alt="Logo" />
    </a>

    <nav>
      <a href="catalog.html">Catalog</a>
      <a href="ideas.html">Ideas</a>
      <a href="create.html">Create</a>
      <a href="dynamites.html">Dynamites</a>
    </nav>

  </div>

  <div class="search-container">
    <input type="text" class="search-bar" placeholder="Search...">
  </div>

  <div id="authButtons">
    <a href="signup.html">
      <button class="green-btn">Sign Up</button>
    </a>

    <a href="login.html">
      <button class="green-btn">Log In</button>
    </a>
  </div>
</header>

<main>

  <h1 class="shop-title">Dynamites Shop</h1>

  <div class="balance-text">
    💥 Your Dynamites:
    <span id="balance">0</span>
  </div>

  <div class="shop-grid">

    <!-- 100 -->

    <div class="dynamite-card">

      <div class="card-image">

        <img src="dynamites_new_explosion.png">

        <button class="buy-overlay" onclick="buyDynamites(100)">
          Buy
        </button>

      </div>

      <div class="card-info">
        <h2>100</h2>
        <p>Dynamites</p>
      </div>

    </div>

    <!-- 500 -->

    <div class="dynamite-card">

      <div class="card-image">

        <img src="dynamites_new_explosion.png">

        <button class="buy-overlay" onclick="buyDynamites(500)">
          Buy
        </button>

      </div>

      <div class="card-info">
        <h2>500</h2>
        <p>Dynamites</p>
      </div>

    </div>

    <!-- 1000 -->

    <div class="dynamite-card">

      <div class="card-image">

        <img src="dynamites_new_explosion.png">

        <button class="buy-overlay" onclick="buyDynamites(1000)">
          Buy
        </button>

      </div>

      <div class="card-info">
        <h2>1000</h2>
        <p>Dynamites</p>
      </div>

    </div>

  </div>

</main>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
  authDomain: "dynaduck-19dbb.firebaseapp.com",
  databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dynaduck-19dbb",
  storageBucket: "dynaduck-19dbb.firebasestorage.app",
  messagingSenderId: "777148453502",
  appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
};

if(!firebase.apps.length){
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

/* HEADER */

function updateHeader() {

  const authDiv = document.getElementById('authButtons');
  const loggedInUser = localStorage.getItem('loggedInUser');

  if(loggedInUser){

    authDiv.innerHTML = `
      <span style="color:white;font-weight:bold;margin-right:15px;">
        Welcome, ${loggedInUser}!
      </span>

      <a href="settings.html">
        <button class="green-btn">Settings</button>
      </a>

      <button class="green-btn" onclick="logout()">
        Logout
      </button>
    `;

    loadBalance();

  } else {

    authDiv.innerHTML = `
      <a href="signup.html">
        <button class="green-btn">Sign Up</button>
      </a>

      <a href="login.html">
        <button class="green-btn">Log In</button>
      </a>
    `;
  }
}

function logout(){
  localStorage.removeItem('loggedInUser');
  location.reload();
}

/* BALANCE */

function loadBalance(){

  const user = localStorage.getItem("loggedInUser");

  db.ref("users/" + user + "/dynamites")
  .on("value", snap => {

    let balance = snap.val();

    if(balance == null){
      balance = 0;
    }

    document.getElementById("balance").innerText = balance;

  });

}

/* BUY */

function buyDynamites(amount){

  const user = localStorage.getItem("loggedInUser");

  if(!user){
    alert("Login first!");
    return;
  }

  const ref = db.ref("users/" + user + "/dynamites");

  ref.get().then(snap => {

    let current = snap.val();

    if(current == null){
      current = 0;
    }

    current += amount;

    ref.set(current);

    alert("Bought " + amount + " Dynamites!");

  });

}

window.addEventListener('DOMContentLoaded', updateHeader);

</script>

</body>
</html>
