<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DynaDuck - Dynamites</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#e9e9e9;
}

/* HEADER */

header{
  background:#333;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  height:60px;
}

nav{
  display:flex;
  gap:20px;
  align-items:center;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.green-btn{
  background:#11AD36;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.green-btn:hover{
  background:#0d8f2b;
}

/* PAGE */

.page-title{
  text-align:center;
  margin-top:40px;
  font-size:2.3em;
  color:#222;
}

/* SHOP */

.shop-grid{
  max-width:1000px;
  margin:40px auto;
  display:flex;
  justify-content:center;
  gap:35px;
  flex-wrap:wrap;
}

/* CARD */

.dynamite-card{
  width:220px;
  background:white;
  border:8px solid black;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
  transition:0.2s;
}

.dynamite-card:hover{
  transform:translateY(-5px);
}

.card-image{
  position:relative;
  width:100%;
  height:240px;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card-image img{
  width:85%;
  height:auto;
}

/* BUTTON OVER IMAGE */

.buy-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  background:#11AD36;
  color:white;
  border:none;
  padding:14px;
  font-size:1.2em;
  font-weight:bold;
  cursor:pointer;
}

.buy-overlay:hover{
  background:#0d8f2b;
}

/* TEXT */

.card-info{
  padding:15px;
  text-align:center;
}

.card-info h2{
  margin:0;
  font-size:2em;
}

.card-info p{
  margin-top:5px;
  color:#444;
  font-size:1.1em;
}

/* BALANCE */

.balance-box{
  text-align:center;
  margin-top:25px;
  font-size:1.4em;
  font-weight:bold;
  color:#11AD36;
}
</style>
</head>

<body>

<header>

  <nav>
    <a href="index.html">
      <img src="logo.png" class="logo">
    </a>

    <a href="catalog.html">Catalog</a>
    <a href="ideas.html">Ideas</a>
    <a href="create.html">Create</a>
    <a href="dynamites.html">Dynamites</a>
  </nav>

  <div id="authButtons"></div>

</header>

<h1 class="page-title">Dynamites Shop</h1>

<div class="balance-box">
  💥 Your Dynamites: <span id="balance">0</span>
</div>

<div class="shop-grid">

  <!-- 100 -->

  <div class="dynamite-card">

    <div class="card-image">
      <img src="dynamites_new_explosion.png">

      <button class="buy-overlay" onclick="buyDynamites(100)">
        Buy
      </button>
    </div>

    <div class="card-info">
      <h2>100</h2>
      <p>Dynamites</p>
    </div>

  </div>

  <!-- 500 -->

  <div class="dynamite-card">

    <div class="card-image">
      <img src="dynamites_new_explosion.png">

      <button class="buy-overlay" onclick="buyDynamites(500)">
        Buy
      </button>
    </div>

    <div class="card-info">
      <h2>500</h2>
      <p>Dynamites</p>
    </div>

  </div>

  <!-- 1000 -->

  <div class="dynamite-card">

    <div class="card-image">
      <img src="dynamites_new_explosion.png">

      <button class="buy-overlay" onclick="buyDynamites(1000)">
        Buy
      </button>
    </div>

    <div class="card-info">
      <h2>1000</h2>
      <p>Dynamites</p>
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
  authDomain: "dynaduck-19dbb.firebaseapp.com",
  databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dynaduck-19dbb",
  storageBucket: "dynaduck-19dbb.firebasestorage.app",
  messagingSenderId: "777148453502",
  appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
};

if (!firebase.apps.length){
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

const currentUser = localStorage.getItem("loggedInUser");

/* AUTH HEADER */

function updateHeader(){

  const authDiv = document.getElementById("authButtons");

  if(currentUser){

    authDiv.innerHTML = `
      <span style="color:white;font-weight:bold;margin-right:15px;">
        ${currentUser}
      </span>

      <a href="settings.html">
        <button class="green-btn">Settings</button>
      </a>

      <button class="green-btn" onclick="logout()">
        Logout
      </button>
    `;

    loadBalance();

  }else{

    authDiv.innerHTML = `
      <a href="signup.html">
        <button class="green-btn">Sign Up</button>
      </a>

      <a href="login.html">
        <button class="green-btn">Log In</button>
      </a>
    `;
  }
}

function logout(){
  localStorage.removeItem("loggedInUser");
  location.reload();
}

/* BALANCE */

function loadBalance(){

  db.ref("users/" + currentUser + "/dynamites")
  .on("value", snap => {

    let balance = snap.val();

    if(balance == null){
      balance = 0;
    }

    document.getElementById("balance").innerText = balance;
  });
}

/* BUY */

function buyDynamites(amount){

  if(!currentUser){
    alert("Login first");
    return;
  }

  db.ref("users/" + currentUser + "/dynamites")
  .get()
  .then(snap => {

    let current = snap.val();

    if(current == null){
      current = 0;
    }

    current += amount;

    db.ref("users/" + currentUser + "/dynamites")
    .set(current);

    alert("You bought " + amount + " Dynamites!");
  });
}

window.onload = updateHeader;
</script>

</body>
</html>
