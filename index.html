<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DynaDuck - Home</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .home-layout { display: flex; max-width: 1100px; margin: 40px auto; gap: 30px; padding: 0 20px; }
    .main-feed { flex: 3; }
    .sidebar { 
      flex: 1; background: white; border-radius: 12px; padding: 20px; 
      border: 1px solid #ccc; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: fit-content; 
    }
    .friend-card { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
    .online-dot { width: 10px; height: 10px; border-radius: 50%; transition: 0.3s; }
    .search-friend-box { display: flex; gap: 5px; margin-bottom: 15px; }
    .search-friend-box input { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ccc; }
    
    /* Request Box Styling */
    #pendingSection {
      background: #fffbe6; padding: 12px; border-radius: 8px; 
      margin-bottom: 20px; border: 1px solid #ffe58f; display: none;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html"><img src="logo.png" class="logo" alt="Logo"></a>
    <nav>
      <a href="catalog.html">Catalog</a>
      <a href="ideas.html">Ideas</a>
      <a href="create.html">Create</a>
    </nav>
  </div>
  <div class="search-container">
    <input type="text" placeholder="Search games..." class="search-bar">
  </div>
  <div id="authButtons"></div>
</header>

<div class="home-layout">
  <main class="main-feed">
    <h1 id="welcomeText">Welcome to DynaDuck</h1>
    <div class="games-grid">
      <div class="game-card" onclick="location.href='baseplate.html'">
        <div style="background: #339933; height: 140px; background-image: radial-gradient(#2a882a 15%, transparent 15%); background-size: 20px 20px;"></div>
        <div class="game-info">
          <h2>Baseplate</h2>
          <p class="creator">by DynaDuck</p>
        </div>
      </div>
    </div>
  </main>

  <aside class="sidebar">
    <h3>Social</h3>
    <div class="search-friend-box">
      <input type="text" id="friendInput" placeholder="Username...">
      <button class="green-btn" onclick="sendRequest()">Add</button>
    </div>

    <div id="pendingSection">
      <strong style="font-size: 0.8em; color: #856404;">FRIEND REQUESTS</strong>
      <div id="requestList"></div>
    </div>

    <div id="friendsList">
      <p style="color: #999; font-size: 0.8em;">Log in to see friends.</p>
    </div>
  </aside>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
    authDomain: "dynaduck-19dbb.firebaseapp.com",
    databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "dynaduck-19dbb",
    storageBucket: "dynaduck-19dbb.firebasestorage.app",
    messagingSenderId: "777148453502",
    appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
  };

  if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
  const db = firebase.database();
  const currentUser = localStorage.getItem('loggedInUser');

  // --- UI & AUTH ---
  function initPage() {
    const authDiv = document.getElementById('authButtons');
    if (currentUser) {
      document.getElementById('welcomeText').innerText = "Hi, " + currentUser + "!";
      authDiv.innerHTML = `<button class="green-btn" onclick="logout()">Logout</button>`;
      
      // Set Online Status
      db.ref('users/' + currentUser + '/presence').set("online");
      db.ref('users/' + currentUser + '/presence').onDisconnect().set("offline");
      
      loadSocial();
    } else {
      authDiv.innerHTML = `<a href="login.html"><button class="green-btn">Log In</button></a>`;
    }
  }

  function logout() {
    db.ref('users/' + currentUser + '/presence').set("offline").then(() => {
      localStorage.removeItem('loggedInUser');
      location.reload();
    });
  }

  // --- FRIENDING SYSTEM ---
  function sendRequest() {
    const target = document.getElementById('friendInput').value.trim();
    if (!currentUser || !target || target === currentUser) return;

    db.ref('users/' + target).get().then((snap) => {
      if (snap.exists()) {
        db.ref('users/' + target + '/requests/' + currentUser).set(true);
        alert("Request sent!");
      } else { alert("User not found!"); }
    });
  }

  function loadSocial() {
    // Listen for Requests
    db.ref('users/' + currentUser + '/requests').on('value', (snap) => {
      const reqs = snap.val();
      const section = document.getElementById('pendingSection');
      const list = document.getElementById('requestList');
      if (reqs) {
        section.style.display = "block";
        list.innerHTML = "";
        Object.keys(reqs).forEach(sender => {
          list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-top:5px;">
            <span>${sender}</span>
            <button class="green-btn" style="padding:2px 5px; font-size:0.7em;" onclick="acceptFriend('${sender}')">Accept</button>
          </div>`;
        });
      } else { section.style.display = "none"; }
    });

    // Listen for Friends and their LIVE Status
    db.ref('users/' + currentUser + '/friends').on('value', (snap) => {
      const friends = snap.val();
      const listDiv = document.getElementById('friendsList');
      listDiv.innerHTML = friends ? "" : "<p style='color:#999;'>No friends yet.</p>";
      
      if (friends) {
        Object.keys(friends).forEach(fName => {
          db.ref('users/' + fName + '/presence').on('value', (statusSnap) => {
            const status = statusSnap.val() || "offline";
            const color = status === "online" ? "#11AD36" : "#888";
            let el = document.getElementById('f-' + fName);
            if (!el) {
              el = document.createElement('div');
              el.id = 'f-' + fName;
              el.className = 'friend-card';
              listDiv.appendChild(el);
            }
            el.innerHTML = `<div class="online-dot" style="background:${color}"></div>
                            <strong>${fName}</strong> <small style="color:#999">(${status})</small>`;
          });
        });
      }
    });
  }

  function acceptFriend(sender) {
    db.ref('users/' + currentUser + '/friends/' + sender).set(true);
    db.ref('users/' + sender + '/friends/' + currentUser).set(true);
    db.ref('users/' + currentUser + '/requests/' + sender).remove();
  }

  window.onload = initPage;
</script>
</body>
</html>
