<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DynaDuck - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html"><img src="logo.png" class="logo" alt="Logo"></a>
    <nav>
      <a href="catalog.html">Catalog</a>
      <a href="ideas.html">Ideas</a>
      <a href="create.html">Create</a>
      <a href="dynamites.html">Dynamites</a>
    </nav>
  </div>

  <div class="search-container">
    <input type="text" placeholder="Search games..." class="search-bar">
  </div>

  <div id="authButtons">
    </div>
</header>

<main class="main-container" style="max-width:1000px; margin: 40px auto; padding: 0 20px;">
  <section>
    <h1 style="font-size: 2.5em; color: #333;">Welcome to DynaDuck</h1>
    <p style="font-size: 1.2em; color: #666;">The ultimate place to build, play, and chill with friends.</p>
  </section>

  <section style="margin-top: 50px;">
    <h2 style="border-bottom: 2px solid #11AD36; padding-bottom: 10px;">Featured Games</h2>
    
    <div class="games-grid">
      <div class="game-card" onclick="location.href='baseplate.html'">
        <div style="background: #ddd; height: 140px; display: flex; align-items: center; justify-content: center;">
             <span style="color: #999;">Game Preview</span>
        </div>
        <div class="game-info">
          <h2>Baseplate and Friends</h2>
          <p class="creator">by DynaDuck Team</p>
          <p>The classic hangout.</p>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // 1. YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyDM3_vpaeh6e8ODIQGAwM1nmg3xsI6wPvI",
    authDomain: "dynaduck-305ae.firebaseapp.com",
    projectId: "dynaduck-305ae",
    databaseURL: "https://dynaduck-305ae-default-rtdb.firebaseio.com/",
    storageBucket: "dynaduck-305ae.firebasestorage.app",
    messagingSenderId: "1095752853036",
    appId: "1:1095752853036:web:bd47e8e3858417a0429389"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // 2. HEADER LOGIC (Who are we?)
  function updateHeader() {
    const authDiv = document.getElementById('authButtons');
    const loggedInUser = localStorage.getItem('loggedInUser');

    if (loggedInUser) {
      // If logged in, show username and Logout button
      authDiv.innerHTML = `
        <span style="font-weight:bold; color:white; margin-right:15px;">Hi, ${loggedInUser}!</span>
        <button class="green-btn" onclick="logout()">Logout</button>
      `;
    } else {
      // If not logged in, show Sign Up / Log In
      authDiv.innerHTML = `
        <a href="signup.html"><button class="green-btn">Sign Up</button></a>
        <a href="login.html" style="margin-left:10px;"><button class="green-btn">Log In</button></a>
      `;
    }
  }

  function logout() {
    localStorage.removeItem('loggedInUser');
    location.reload();
  }

  // Run header check on load
  window.addEventListener('DOMContentLoaded', updateHeader);
</script>

</body>
</html>
