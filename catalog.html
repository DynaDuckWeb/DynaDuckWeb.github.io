<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Catalog & Avatar Editor - DynaDuck</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Catalog Layout Styles */
    .catalog-layout {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 30px;
    }

    /* Left Sidebar: Body Colors Picker */
    .catalog-sidebar {
      width: 200px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar-box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .sidebar-box h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 1.1em;
      border-bottom: 2px solid #f2f2f2;
      padding-bottom: 8px;
    }

    .editor-select {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 0.95em;
      margin-bottom: 15px;
      outline: none;
    }
    
    .editor-select:focus {
      border-color: #11AD36;
    }

    .color-palette {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-dot {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.15);
      transition: 0.1s;
    }

    .color-dot:hover {
      transform: scale(1.1);
    }

    /* MIDDLE: Character Preview & Store Cards */
    .catalog-main-area {
      flex: 1;
      display: flex;
      gap: 40px;
      align-items: flex-start;
      padding: 0 10px;
    }

    /* Classic Blocky Character Component from 213.PNG */
    .avatar-preview-container {
      width: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }

    .avatar-character {
      position: relative;
      width: 120px;
      height: 220px;
    }

    /* Avatar Body Parts Styling */
    .av-part {
      position: absolute;
      border: 2px solid #000;
      background-color: #ffcd3a; /* Default classic yellow */
      box-sizing: border-box;
      transition: background-color 0.2s;
    }

    #av-head {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      left: 38px;
      top: 0px;
      z-index: 3;
    }

    #av-torso {
      width: 52px;
      height: 70px;
      left: 34px;
      top: 46px;
      z-index: 2;
    }

    #av-leftArm {
      width: 24px;
      height: 65px;
      left: 8px;
      top: 48px;
    }

    #av-rightArm {
      width: 24px;
      height: 65px;
      left: 88px;
      top: 48px;
    }

    #av-leftLeg {
      width: 24px;
      height: 75px;
      left: 34px;
      top: 118px;
    }

    #av-rightLeg {
      width: 24px;
      height: 75px;
      left: 62px;
      top: 118px;
    }

    /* Marketplace Items Grid */
    .catalog-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    .item-card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      text-align: center;
      border: 2px solid #000; /* Matching retro borders */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .item-placeholder-box {
      width: 100%;
      height: 130px;
      border: 2px solid #000;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      padding: 10px;
      box-sizing: border-box;
    }

    .item-placeholder-box .item-title-text {
      font-size: 1.3em;
      font-weight: bold;
      color: #000;
      margin: 2px 0;
    }

    .item-card button {
      width: 100%;
      border: 2px solid #000;
      border-radius: 10px;
      padding: 12px;
      font-weight: bold;
    }

    /* Right Sidebar: Categories */
    .category-sidebar {
      width: 160px;
      background: white;
      padding: 20px 15px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      text-align: center;
    }

    .category-sidebar h2 {
      margin-top: 0;
      font-size: 1.4em;
      margin-bottom: 20px;
    }

    .cat-btn {
      display: block;
      width: 100%;
      background: white;
      border: 2px solid #ccc;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 12px;
      transition: 0.2s;
    }

    .cat-btn:hover {
      border-color: #11AD36;
      color: #11AD36;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <a href="index.html"><img src="logo.png" class="logo" alt="Logo"></a>
      <nav>
        <a href="catalog.html" style="color: #11AD36;">Catalog</a>
        <a href="ideas.html">Ideas</a>
        <a href="create.html">Create</a>
        <a href="dynamites.html">Dynamites</a>
      </nav>
    </div>

    <div class="search-container">
      <input type="text" class="search-bar" placeholder="Search...">
    </div>

    <div id="authButtons"></div>
  </header>

  <div class="main-container catalog-layout">
    
    <aside class="catalog-sidebar">
      <div class="sidebar-box">
        <h3>Body Colors</h3>
        <select id="bodyPartSelect" class="editor-select">
          <option value="head">Head</option>
          <option value="torso">Torso</option>
          <option value="leftArm">Left Arm</option>
          <option value="rightArm">Right Arm</option>
          <option value="leftLeg">Left Leg</option>
          <option value="rightLeg">Right Leg</option>
        </select>
        
        <div class="color-palette">
          <div class="color-dot" style="background: #ffcd3a;" onclick="changeBodyColor('#ffcd3a')"></div>
          <div class="color-dot" style="background: #0055ff;" onclick="changeBodyColor('#0055ff')"></div>
          <div class="color-dot" style="background: #11AD36;" onclick="changeBodyColor('#11AD36')"></div>
          <div class="color-dot" style="background: #ff3b30;" onclick="changeBodyColor('#ff3b30')"></div>
          <div class="color-dot" style="background: #ffffff;" onclick="changeBodyColor('#ffffff')"></div>
          <div class="color-dot" style="background: #222222;" onclick="changeBodyColor('#222222')"></div>
        </div>
      </div>
    </aside>

    <div class="catalog-main-area">
      
      <div class="avatar-preview-container">
        <div class="avatar-character">
          <div id="av-head" class="av-part"></div>
          <div id="av-torso" class="av-part"></div>
          <div id="av-leftArm" class="av-part"></div>
          <div id="av-rightArm" class="av-part"></div>
          <div id="av-leftLeg" class="av-part"></div>
          <div id="av-rightLeg" class="av-part"></div>
        </div>
      </div>

      <div class="catalog-grid" id="catalogGrid">
        </div>

    </div>

    <aside class="category-sidebar">
      <h2>Category</h2>
      <button class="cat-btn" onclick="loadCatalog('Shirt')">Shirts</button>
      <button class="cat-btn" onclick="loadCatalog('Pants')">Pants</button>
      <button class="cat-btn" onclick="loadCatalog('Hats')">Hats</button>
    </aside>

  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
      authDomain: "dynaduck-19dbb.firebaseapp.com",
      databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "dynaduck-19dbb",
      storageBucket: "dynaduck-19dbb.firebasestorage.app",
      messagingSenderId: "777148453502",
      appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // HEADER FUNCTION
    function updateHeader() {
      const authDiv = document.getElementById('authButtons');
      const loggedInUser = localStorage.getItem('loggedInUser');

      if (loggedInUser) {
        authDiv.innerHTML = `
          <span style="color:white;font-weight:bold;margin-right:15px;">Welcome, ${loggedInUser}!</span>
          <a href="settings.html"><button class="green-btn">Settings</button></a>
          <button class="green-btn" onclick="logout()">Logout</button>
        `;
        // Listen to live character color updates for the logged-in user
        listenToAvatarColors(loggedInUser);
      } else {
        authDiv.innerHTML = `
          <a href="signup.html"><button class="green-btn">Sign Up</button></a>
          <a href="login.html"><button class="green-btn">Log In</button></a>
        `;
      }
    }

    function logout() {
      localStorage.removeItem('loggedInUser');
      localStorage.removeItem('isAdmin');
      window.location.reload();
    }

    // LIVE AVATAR COLOR LISTENER
    function listenToAvatarColors(username) {
      db.ref(`users/${username}/avatar/colors`).on('value', (snapshot) => {
        if (snapshot.exists()) {
          const colors = snapshot.val();
          // Apply colors from database to the HTML elements
          if (colors.head) document.getElementById('av-head').style.backgroundColor = colors.head;
          if (colors.torso) document.getElementById('av-torso').style.backgroundColor = colors.torso;
          if (colors.leftArm) document.getElementById('av-leftArm').style.backgroundColor = colors.leftArm;
          if (colors.rightArm) document.getElementById('av-rightArm').style.backgroundColor = colors.rightArm;
          if (colors.leftLeg) document.getElementById('av-leftLeg').style.backgroundColor = colors.leftLeg;
          if (colors.rightLeg) document.getElementById('av-rightLeg').style.backgroundColor = colors.rightLeg;
        }
      });
    }

    // UPDATE AVATAR COLOR IN FIREBASE
    function changeBodyColor(hexColor) {
      const username = localStorage.getItem('loggedInUser');
      const selectedPart = document.getElementById('bodyPartSelect').value;

      if (!username) {
        alert("Please log in to edit your avatar colors!");
        return;
      }

      db.ref(`users/${username}/avatar/colors/${selectedPart}`).set(hexColor)
        .catch(err => console.error("Error setting color:", err));
    }

    // LOAD MARKETPLACE ITEMS
    function loadCatalog(filterType = 'Shirt') {
      const grid = document.getElementById('catalogGrid');
      grid.innerHTML = "<p>Loading products...</p>";

      db.ref('catalog').get().then((snapshot) => {
        if (snapshot.exists()) {
          grid.innerHTML = "";
          
          snapshot.forEach((childSnapshot) => {
            const item = childSnapshot.val();
            const itemId = childSnapshot.key;

            if (item.type !== filterType) return;

            // Generate the text box design based on your 213.PNG sketch
            const cardHTML = `
              <div class="item-card">
                <div class="item-placeholder-box">
                  <div class="item-title-text">${item.name.split(' ')[0] || 'DynaDuck'}</div>
                  <div class="item-title-text">${item.name.split(' ')[1] || 'Item'}</div>
                  <div class="item-title-text">${item.name.split(' ')[2] || ''}</div>
                </div>
                <button class="green-btn" onclick="buyItem('${itemId}', ${item.price})">
                  Buy<br><span style="font-size:0.75em; font-weight:normal;">${item.price} Dynamites</span>
                </button>
              </div>
            `;
            grid.innerHTML += cardHTML;
          });
          
          if (grid.innerHTML === "") {
            grid.innerHTML = `<p>No items found in ${filterType}.</p>`;
          }
        } else {
          grid.innerHTML = "<p>Marketplace is empty.</p>";
        }
      });
    }

    // TRANSACTION PROCESSING
    function buyItem(itemId, price) {
      const username = localStorage.getItem('loggedInUser');
      if (!username) {
        alert("Please log in to purchase items!");
        return;
      }

      db.ref('users/' + username).get().then((snapshot) => {
        if (snapshot.exists()) {
          const userData = snapshot.val();
          const currentBalance = userData.currency !== undefined ? userData.currency : 0;

          if (currentBalance < price && username !== "Admin") {
            alert(`You need ${price} Dynamites!`);
            return;
          }

          if (userData.inventory && userData.inventory[itemId]) {
            alert("You already own this item!");
            return;
          }

          const newBalance = username === "Admin" ? currentBalance : (currentBalance - price);
          const updates = {};
          updates[`users/${username}/currency`] = newBalance;
          updates[`users/${username}/inventory/${itemId}`] = true;

          db.ref().update(updates).then(() => {
            alert("Item bought successfully!");
          });
        }
      });
    }

    window.addEventListener('DOMContentLoaded', () => {
      updateHeader();
      loadCatalog('Shirt'); // Starts by displaying shirts first
    });
  </script>
</body>
</html>
