<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DynaDuck Catalog</title>
  <style>
    /* Base Page Styling */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #eeeeee; /* Light gray matching your drawing */
    }

    /* ------------------------------------------- */
    /* HEADER                                      */
    /* ------------------------------------------- */
    header {
      background-color: #333333;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 25px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 25px;
    }

    .logo {
      height: 40px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
    }
    
    nav a.active {
      color: #11AD36;
    }

    .search-bar {
      padding: 10px;
      border-radius: 5px;
      border: none;
      width: 300px;
      outline: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: bold;
    }

    .header-btn {
      background: #11AD36;
      border: none;
      padding: 8px 16px;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    /* ------------------------------------------- */
    /* MAIN LAYOUT MATRIX                          */
    /* ------------------------------------------- */
    .main-container {
      display: flex;
      justify-content: space-between;
      padding: 40px 50px;
      gap: 30px;
    }

    /* ------------------------------------------- */
    /* LEFT SECTION: Picker & Avatar               */
    /* ------------------------------------------- */
    .left-section {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    /* Body Colors Panel */
    .body-colors-panel {
      background: white;
      border-radius: 8px;
      padding: 15px;
      width: 140px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .body-colors-panel h3 {
      margin-top: 0;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .body-colors-panel select {
      width: 100%;
      padding: 6px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .color-box {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid #ddd;
      cursor: pointer;
    }

    /* Blocky Avatar Design */
    .avatar-container {
      position: relative;
      width: 140px;
      height: 250px;
    }

    .av-part {
      position: absolute;
      border: 3px solid black;
      box-sizing: border-box;
    }

    .av-head {
      width: 60px; 
      height: 60px;
      background: #ffee00;
      border-radius: 50%;
      top: 0; 
      left: 36px;
      z-index: 10;
    }

    .av-torso {
      width: 74px; 
      height: 80px;
      background: #e3242b; /* Red */
      top: 57px; 
      left: 29px;
      z-index: 5;
      display: flex;
      align-items: center;
    }

    .av-torso-stripe {
      width: 100%; 
      height: 24px;
      background: white;
      border-top: 3px solid black;
      border-bottom: 3px solid black;
    }

    .av-l-arm {
      width: 32px; 
      height: 80px;
      background: #ffee00;
      top: 57px; 
      left: -3px;
    }

    .av-r-arm {
      width: 32px; 
      height: 80px;
      background: #ffee00;
      top: 57px; 
      left: 103px;
    }

    .av-l-leg {
      width: 37px; 
      height: 80px;
      background: #ffee00;
      top: 134px; 
      left: 29px;
    }

    .av-r-leg {
      width: 37px; 
      height: 80px;
      background: #ffee00;
      top: 134px; 
      left: 66px;
    }

    /* ------------------------------------------- */
    /* CENTER SECTION: Store Items                 */
    /* ------------------------------------------- */
    .center-section {
      flex-grow: 1;
      display: flex;
      justify-content: flex-start;
      padding-left: 20px;
    }

    .item-card {
      width: 160px;
      display: flex;
      flex-direction: column;
      gap: 5px; /* Slight gap between box and button */
    }

    .item-box {
      border: 4px solid black;
      background: white;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-sizing: border-box;
      padding: 10px;
    }

    .item-box h4 {
      margin: 0;
      font-size: 22px;
      line-height: 1.3;
    }

    .item-btn {
      border: 4px solid black;
      background: #28a745;
      border-radius: 12px; /* Thick rounded corners */
      padding: 12px 5px;
      cursor: pointer;
      text-align: center;
      color: black;
    }

    .item-btn:hover {
      background: #218838;
    }

    .btn-text-buy {
      font-weight: bold; 
      font-size: 20px; 
      display: block; 
      margin-bottom: 2px;
    }

    .btn-text-price {
      font-size: 13px; 
      font-weight: bold; 
    }

    /* ------------------------------------------- */
    /* RIGHT SECTION: Categories                   */
    /* ------------------------------------------- */
    .right-section {
      background: white;
      border-radius: 15px;
      padding: 25px 20px;
      width: 180px;
      height: fit-content;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    .right-section h2 {
      margin-top: 0;
      font-size: 24px;
      margin-bottom: 25px;
    }

    .cat-button {
      display: block;
      width: 100%;
      background: white;
      border: 4px solid #cccccc; /* Thick gray borders */
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      color: black;
      box-sizing: border-box;
    }

    .cat-button:hover {
      border-color: #11AD36;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <a href="#"><img src="logo.png" class="logo" alt="Logo"></a>
      <nav>
        <a href="#" class="active">Catalog</a>
        <a href="#">Ideas</a>
        <a href="#">Create</a>
        <a href="#">Dynamites</a>
      </nav>
    </div>

    <div>
      <input type="text" class="search-bar" placeholder="Search...">
    </div>

    <div class="header-right">
      <span>Welcome, Admin!</span>
      <button class="header-btn">Settings</button>
      <button class="header-btn">Logout</button>
    </div>
  </header>

  <div class="main-container">
    
    <div class="left-section">
      
      <div class="body-colors-panel">
        <h3>Body Colors</h3>
        <select>
          <option>Head</option>
          <option>Torso</option>
          <option>Left Arm</option>
          <option>Right Arm</option>
          <option>Left Leg</option>
          <option>Right Leg</option>
        </select>
        
        <div class="color-grid">
          <div class="color-box" style="background: #ffcd3a;"></div>
          <div class="color-box" style="background: #0055ff;"></div>
          <div class="color-box" style="background: #11AD36;"></div>
          <div class="color-box" style="background: #ff3b30;"></div>
          <div class="color-box" style="background: #ffffff;"></div>
          <div class="color-box" style="background: #222222;"></div>
        </div>
      </div>

      <div class="avatar-container">
        <div class="av-part av-head"></div>
        <div class="av-part av-l-arm"></div>
        <div class="av-part av-r-arm"></div>
        <div class="av-part av-torso">
          <div class="av-torso-stripe"></div>
        </div>
        <div class="av-part av-l-leg"></div>
        <div class="av-part av-r-leg"></div>
      </div>

    </div>

    <div class="center-section">
      
      <div class="item-card">
        <div class="item-box">
          <h4>DynaDuck<br>Logo<br>T-Shirt</h4>
        </div>
        <div class="item-btn">
          <span class="btn-text-buy">Buy</span>
          <span class="btn-text-price">25 Dynamites</span>
        </div>
      </div>

    </div>

    <div class="right-section">
      <h2>Category</h2>
      <button class="cat-button">Shirts</button>
      <button class="cat-button">Pants</button>
      <button class="cat-button">Hats</button>
    </div>

  </div>

</body>
</html>
