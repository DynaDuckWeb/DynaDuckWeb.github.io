<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DynaDuck Catalog</title>
  <style>
    /* Base Page Styling */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #eeeeee;
    }

    /* ------------------------------------------- */
    /* HEADER                                      */
    /* ------------------------------------------- */
    header {
      background-color: #333333;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 25px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 25px;
    }

    .logo { height: 40px; }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
    }
    
    nav a.active { color: #11AD36; }

    .search-bar {
      padding: 10px;
      border-radius: 5px;
      border: none;
      width: 300px;
      outline: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: bold;
    }

    .header-btn {
      background: #11AD36;
      border: none;
      padding: 8px 16px;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    /* ------------------------------------------- */
    /* MAIN LAYOUT MATRIX                          */
    /* ------------------------------------------- */
    .main-container {
      display: flex;
      justify-content: space-between;
      padding: 40px 50px;
      gap: 30px;
    }

    /* ------------------------------------------- */
    /* LEFT SECTION: Editor, Avatar & Inventory    */
    /* ------------------------------------------- */
    .left-column {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 320px;
      flex-shrink: 0;
    }

    .editor-top-row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    /* Body Colors Panel */
    .body-colors-panel {
      background: white;
      border-radius: 8px;
      padding: 15px;
      width: 140px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      box-sizing: border-box;
    }

    .body-colors-panel h3 {
      margin-top: 0;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .body-colors-panel select {
      width: 100%;
      padding: 6px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-weight: bold;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .color-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 6px;
      border: 2px solid rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .color-box:hover { transform: scale(1.1); }

    /* Blocky Avatar Design */
    .avatar-container {
      position: relative;
      width: 140px;
      height: 250px;
    }

    .av-part {
      position: absolute;
      border: 3px solid black;
      box-sizing: border-box;
      transition: background-color 0.2s;
    }

    .av-head { width: 60px; height: 60px; background: #ffcd3a; border-radius: 50%; top: 0; left: 36px; z-index: 10; }
    .av-torso { width: 74px; height: 80px; background: #e3242b; top: 57px; left: 29px; z-index: 5; display: flex; align-items: center; }
    .av-torso-stripe { width: 100%; height: 24px; background: white; border-top: 3px solid black; border-bottom: 3px solid black; }
    .av-l-arm { width: 32px; height: 80px; background: #ffcd3a; top: 57px; left: -3px; }
    .av-r-arm { width: 32px; height: 80px; background: #ffcd3a; top: 57px; left: 103px; }
    .av-l-leg { width: 37px; height: 80px; background: #ffcd3a; top: 134px; left: 29px; }
    .av-r-leg { width: 37px; height: 80px; background: #ffcd3a; top: 134px; left: 66px; }

    /* Inventory Panel (Below Avatar) */
    .inventory-panel {
      background: white;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border: 2px solid #ccc;
    }
    .inventory-panel h3 { margin-top: 0; margin-bottom: 10px; font-size: 16px; text-align: center; }
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .inventory-item {
      border: 2px solid black;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      background: #f9f9f9;
      cursor: pointer;
    }
    .inventory-item:hover { background: #e0e0e0; }

    /* ------------------------------------------- */
    /* CENTER SECTION: Store Items                 */
    /* ------------------------------------------- */
    .center-section {
      flex-grow: 1;
      display: flex;
      justify-content: center; /* This centers the items horizontally! */
      align-items: flex-start;
      flex-wrap: wrap; /* Allows wrapping if there are many items */
      gap: 25px;
    }

    .item-card { width: 160px; display: flex; flex-direction: column; gap: 5px; }
    .item-box {
      border: 4px solid black;
      background: white;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-sizing: border-box;
      padding: 10px;
    }
    .item-box h4 { margin: 0; font-size: 22px; line-height: 1.3; }
    .item-btn {
      border: 4px solid black;
      background: #28a745;
      border-radius: 12px;
      padding: 12px 5px;
      cursor: pointer;
      text-align: center;
      color: black;
    }
    .item-btn:hover { background: #218838; }
    .btn-text-buy { font-weight: bold; font-size: 20px; display: block; margin-bottom: 2px; }
    .btn-text-price { font-size: 13px; font-weight: bold; }

    /* ------------------------------------------- */
    /* RIGHT SECTION: Categories                   */
    /* ------------------------------------------- */
    .right-section {
      background: white;
      border-radius: 15px;
      padding: 25px 20px;
      width: 180px;
      height: fit-content;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      flex-shrink: 0;
    }

    .right-section h2 { margin-top: 0; font-size: 24px; margin-bottom: 25px; }
    .cat-button {
      display: block;
      width: 100%;
      background: white;
      border: 4px solid #cccccc;
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      color: black;
      box-sizing: border-box;
    }
    .cat-button:hover { border-color: #11AD36; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <a href="#"><img src="logo.png" class="logo" alt="Logo"></a>
      <nav>
        <a href="#" class="active">Catalog</a>
        <a href="#">Ideas</a>
        <a href="#">Create</a>
        <a href="#">Dynamites</a>
      </nav>
    </div>
    <div>
      <input type="text" class="search-bar" placeholder="Search...">
    </div>
    <div class="header-right">
      <span>Welcome, Admin!</span>
      <button class="header-btn">Settings</button>
      <button class="header-btn">Logout</button>
    </div>
  </header>

  <div class="main-container">
    
    <div class="left-column">
      
      <div class="editor-top-row">
        <div class="body-colors-panel">
          <h3>Body Colors</h3>
          <select id="bodyPartSelect">
            <option value="head">Head</option>
            <option value="torso">Torso</option>
            <option value="l-arm">Left Arm</option>
            <option value="r-arm">Right Arm</option>
            <option value="l-leg">Left Leg</option>
            <option value="r-leg">Right Leg</option>
          </select>
          
          <div class="color-grid">
            <div class="color-box" style="background: #ffcd3a;" onclick="applyColor('#ffcd3a')"></div>
            <div class="color-box" style="background: #0055ff;" onclick="applyColor('#0055ff')"></div>
            <div class="color-box" style="background: #11AD36;" onclick="applyColor('#11AD36')"></div>
            <div class="color-box" style="background: #e3242b;" onclick="applyColor('#e3242b')"></div>
            <div class="color-box" style="background: #ffffff;" onclick="applyColor('#ffffff')"></div>
            <div class="color-box" style="background: #222222;" onclick="applyColor('#222222')"></div>
          </div>
        </div>

        <div class="avatar-container">
          <div id="part-head" class="av-part av-head"></div>
          <div id="part-l-arm" class="av-part av-l-arm"></div>
          <div id="part-r-arm" class="av-part av-r-arm"></div>
          <div id="part-torso" class="av-part av-torso">
            <div class="av-torso-stripe"></div>
          </div>
          <div id="part-l-leg" class="av-part av-l-leg"></div>
          <div id="part-r-leg" class="av-part av-r-leg"></div>
        </div>
      </div>

      <div class="inventory-panel">
        <h3>My Wardrobe</h3>
        <div class="inventory-grid">
          <div class="inventory-item">Basic<br>Shirt</div>
          <div class="inventory-item">Jeans</div>
          <div class="inventory-item" style="border-style: dashed; color: #888;">Empty</div>
          <div class="inventory-item" style="border-style: dashed; color: #888;">Empty</div>
        </div>
      </div>

    </div>

    <div class="center-section">
      <div class="item-card">
        <div class="item-box">
          <h4>DynaDuck<br>Logo<br>T-Shirt</h4>
        </div>
        <div class="item-btn">
          <span class="btn-text-buy">Buy</span>
          <span class="btn-text-price">25 Dynamites</span>
        </div>
      </div>
      
      <div class="item-card">
        <div class="item-box">
          <h4>Admin<br>Red<br>Cap</h4>
        </div>
        <div class="item-btn">
          <span class="btn-text-buy">Buy</span>
          <span class="btn-text-price">50 Dynamites</span>
        </div>
      </div>
    </div>

    <div class="right-section">
      <h2>Category</h2>
      <button class="cat-button">Shirts</button>
      <button class="cat-button">Pants</button>
      <button class="cat-button">Hats</button>
    </div>

  </div>

 <script>
    // 1. INITIALIZE DATABASE
    const db = firebase.database();
    const username = localStorage.getItem('loggedInUser') || "Guest";

    // 2. STATE & LOAD DATA
    let currentColors = { 'head': '#ffcd3a', 'torso': '#e3242b', 'l-arm': '#ffcd3a', 'r-arm': '#ffcd3a', 'l-leg': '#ffcd3a', 'r-leg': '#ffcd3a' };

    // Listen for color updates from DB
    db.ref('users/' + username + '/avatar/colors').on('value', (snapshot) => {
        if(snapshot.exists()) {
            currentColors = snapshot.val();
            for(let part in currentColors) {
                document.getElementById('part-' + part).style.backgroundColor = currentColors[part];
            }
        }
    });

    // 3. COLOR PICKER LOGIC (With Anti-Solid Check)
    function applyColor(hexColor) {
        const selectedPart = document.getElementById('bodyPartSelect').value;
        let testColors = { ...currentColors, [selectedPart]: hexColor };
        
        // Anti-Solid Check: Are they all the same?
        if (Object.values(testColors).every(val => val === hexColor)) {
            alert("Design Rule: Your avatar cannot be a single solid color!");
            return;
        }

        // Apply and Save
        currentColors[selectedPart] = hexColor;
        document.getElementById('part-' + selectedPart).style.backgroundColor = hexColor;
        db.ref('users/' + username + '/avatar/colors/' + selectedPart).set(hexColor);
    }

    // 4. MARKETPLACE LOGIC (Including Crown)
    function loadCatalog() {
        const items = [
            { name: "DynaDuck Logo T-Shirt", price: 25 },
            { name: "Admin Red Cap", price: 50 },
            { name: "Sheldesky's Crown", price: 100000 }
        ];

        const grid = document.querySelector('.center-section');
        grid.innerHTML = "";

        items.forEach(item => {
            grid.innerHTML += `
                <div class="item-card">
                    <div class="item-box"><h4>${item.name.replace(/ /g, '<br>')}</h4></div>
                    <div class="item-btn" onclick="buyItem('${item.name}', ${item.price})">
                        <span class="btn-text-buy">Buy</span>
                        <span class="btn-text-price">${item.price.toLocaleString()} Dynamites</span>
                    </div>
                </div>
            `;
        });
    }

    // 5. BUY ITEM LOGIC
    function buyItem(itemName, price) {
        const userRef = db.ref('users/' + username);
        
        userRef.once('value').then(snapshot => {
            let data = snapshot.val() || { currency: 0 };
            let balance = data.currency || 0;

            if (balance < price) {
                alert("Not enough Dynamites! You have " + balance + ".");
                return;
            }

            // Perform Transaction
            const updates = {};
            updates['currency'] = balance - price;
            updates['inventory/' + itemName] = true;
            
            userRef.update(updates).then(() => {
                alert("Purchase Successful: " + itemName + " added to inventory!");
                updateInventoryUI();
            });
        });
    }

    // 6. UPDATE WARDROBE UI
    function updateInventoryUI() {
        db.ref('users/' + username + '/inventory').once('value').then(snapshot => {
            const container = document.querySelector('.inventory-grid');
            container.innerHTML = "";
            let items = snapshot.val() || {};
            
            Object.keys(items).forEach(item => {
                container.innerHTML += `<div class="inventory-item">${item}</div>`;
            });
        });
    }

    // Init
    window.onload = () => { loadCatalog(); updateInventoryUI(); };
</script>
</body>
</html>
