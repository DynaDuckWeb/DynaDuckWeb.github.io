<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DynaDuck Catalog</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    /* Base Page Styling */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #eeeeee;
    }

    /* ------------------------------------------- */
    /* HEADER                                      */
    /* ------------------------------------------- */

    header {
        background-color: #333333;
        color: white;
        height: 72px;
        padding: 0 30px;

        display: flex;
        align-items: center;
        justify-content: space-between;

        box-sizing: border-box;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 35px;
    }

    .logo {
        height: 48px;
        width: auto;
        display: block;
    }

    nav {
        display: flex;
        gap: 25px;
    }

    nav a {
        color: white;
        text-decoration: none;
        font-weight: bold;
        font-size: 17px;
        line-height: 1;
    }

    nav a.active {
        color: #11AD36;
    }

    .search-bar {
        width: 350px;
        height: 42px;
        padding: 0 15px;

        border: none;
        border-radius: 8px;
        outline: none;

        font-size: 15px;
        box-sizing: border-box;
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
        font-weight: bold;
    }

    .header-btn {
        height: 40px;
        padding: 0 18px;

        background: #11AD36;
        border: none;
        border-radius: 6px;

        color: white;
        font-weight: bold;
        cursor: pointer;
        font-size: 15px;
    }

    /* ------------------------------------------- */
    /* MAIN LAYOUT MATRIX                          */
    /* ------------------------------------------- */
    .main-container {
      display: flex;
      justify-content: space-between;
      padding: 40px 50px;
      gap: 30px;
    }

    /* ------------------------------------------- */
    /* LEFT SECTION: Editor, Avatar & Inventory    */
    /* ------------------------------------------- */
    .left-column {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 320px;
      flex-shrink: 0;
    }

    .editor-top-row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    /* Body Colors Panel */
    .body-colors-panel {
      background: white;
      border-radius: 8px;
      padding: 15px;
      width: 140px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      box-sizing: border-box;
    }

    .body-colors-panel h3 {
      margin-top: 0;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .body-colors-panel select {
      width: 100%;
      padding: 6px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-weight: bold;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .color-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 6px;
      border: 2px solid rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .color-box:hover { transform: scale(1.1); }

    /* Blocky Avatar Design */
    .avatar-container {
      position: relative;
      width: 140px;
      height: 250px;
    }

    .av-part {
      position: absolute;
      border: 3px solid black;
      box-sizing: border-box;
      transition: background-color 0.2s;
    }

    .av-head { width: 60px; height: 60px; background: #ffcd3a; border-radius: 50%; top: 0; left: 36px; z-index: 10; }
    .av-torso { width: 74px; height: 80px; background: #e3242b; top: 57px; left: 29px; z-index: 5; display: flex; align-items: center; }
    .av-torso-stripe { width: 100%; height: 24px; background: white; border-top: 3px solid black; border-bottom: 3px solid black; }
    .av-l-arm { width: 32px; height: 80px; background: #ffcd3a; top: 57px; left: -3px; }
    .av-r-arm { width: 32px; height: 80px; background: #ffcd3a; top: 57px; left: 103px; }
    .av-l-leg { width: 37px; height: 80px; background: #ffcd3a; top: 134px; left: 29px; }
    .av-r-leg { width: 37px; height: 80px; background: #ffcd3a; top: 134px; left: 66px; }

    /* Inventory Panel (Below Avatar) */
    .inventory-panel {
      background: white;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border: 2px solid #ccc;
    }
    .inventory-panel h3 { margin-top: 0; margin-bottom: 10px; font-size: 16px; text-align: center; }
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .inventory-item {
      border: 2px solid black;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      text-align: center;
      background: #f9f9f9;
      cursor: pointer;
    }
    .inventory-item:hover { background: #e0e0e0; }

    /* ------------------------------------------- */
    /* CENTER SECTION: Store Items                 */
    /* ------------------------------------------- */
    .center-section {
      flex-grow: 1;
      display: flex;
      justify-content: center; /* This centers the items horizontally! */
      align-items: flex-start;
      flex-wrap: wrap; /* Allows wrapping if there are many items */
      gap: 25px;
    }

    .item-card { width: 160px; display: flex; flex-direction: column; gap: 5px; }
    .item-box {
      border: 4px solid black;
      background: white;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-sizing: border-box;
      padding: 10px;
    }
    .item-box h4 { margin: 0; font-size: 22px; line-height: 1.3; }
    .item-btn {
      border: 4px solid black;
      background: #28a745;
      border-radius: 12px;
      padding: 12px 5px;
      cursor: pointer;
      text-align: center;
      color: black;
    }
    .item-btn:hover { background: #218838; }
    .btn-text-buy { font-weight: bold; font-size: 20px; display: block; margin-bottom: 2px; }
    .btn-text-price { font-size: 13px; font-weight: bold; }

    /* ------------------------------------------- */
    /* RIGHT SECTION: Categories                   */
    /* ------------------------------------------- */
    .right-section {
      background: white;
      border-radius: 15px;
      padding: 25px 20px;
      width: 180px;
      height: fit-content;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      flex-shrink: 0;
    }

    .right-section h2 { margin-top: 0; font-size: 24px; margin-bottom: 25px; }
    .cat-button {
      display: block;
      width: 100%;
      background: white;
      border: 4px solid #cccccc;
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      color: black;
      box-sizing: border-box;
    }
    .cat-button:hover { border-color: #11AD36; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <a href="#"><img src="logo.png" class="logo" alt="Logo"></a>
      <nav>
        <a href="catalog.html" class="active">Catalog</a>
        <a href="ideas.html">Ideas</a>
        <a href="create.html">Create</a>
        <a href="dynamites.html">Dynamites</a>
      </nav>
    </div>
    <div>
      <input type="text" class="search-bar" placeholder="Search...">
    </div>
    <div class="header-right">
      <span>Welcome, Admin!</span>
      <button class="header-btn">Settings</button>
      <button class="header-btn">Logout</button>
    </div>
  </header>

  <div class="main-container">

    <div class="left-column">

      <div class="editor-top-row">
        <div class="body-colors-panel">
          <h3>Body Colors</h3>
          <select id="bodyPartSelect">
            <option value="head">Head</option>
            <option value="torso">Torso</option>
            <option value="l-arm">Left Arm</option>
            <option value="r-arm">Right Arm</option>
            <option value="l-leg">Left Leg</option>
            <option value="r-leg">Right Leg</option>
          </select>

          <div class="color-grid">
            <div class="color-box" style="background: #ffcd3a;" onclick="applyColor('#ffcd3a')"></div>
            <div class="color-box" style="background: #0055ff;" onclick="applyColor('#0055ff')"></div>
            <div class="color-box" style="background: #11AD36;" onclick="applyColor('#11AD36')"></div>
            <div class="color-box" style="background: #e3242b;" onclick="applyColor('#e3242b')"></div>
            <div class="color-box" style="background: #ffffff;" onclick="applyColor('#ffffff')"></div>
            <div class="color-box" style="background: #222222;" onclick="applyColor('#222222')"></div>
          </div>
        </div>

        <div class="avatar-container">
          <div id="part-head" class="av-part av-head"></div>
          <div id="part-l-arm" class="av-part av-l-arm"></div>
          <div id="part-r-arm" class="av-part av-r-arm"></div>
          <div id="part-torso" class="av-part av-torso">
            <div class="av-torso-stripe"></div>
          </div>
          <div id="part-l-leg" class="av-part av-l-leg"></div>
          <div id="part-r-leg" class="av-part av-r-leg"></div>
        </div>
      </div>

      <div class="inventory-panel">
        <h3>My Wardrobe</h3>
        <div class="inventory-grid">
          <!-- populated by updateInventoryUI() -->
        </div>
      </div>

    </div>

    <div class="center-section">
      <!-- populated by loadCatalog() -->
    </div>

    <div class="right-section">
      <h2>Category</h2>
      <button class="cat-button">Shirts</button>
      <button class="cat-button">Pants</button>
      <button class="cat-button">Hats</button>
    </div>

  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
      authDomain: "dynaduck-19dbb.firebaseapp.com",
      databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "dynaduck-19dbb",
      storageBucket: "dynaduck-19dbb.firebasestorage.app",
      messagingSenderId: "777148453502",
      appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.database();

    const username = "Admin";

    const defaultColors = {
        head: "#ffcd3a",
        torso: "#e3242b",
        "l-arm": "#ffcd3a",
        "r-arm": "#ffcd3a",
        "l-leg": "#ffcd3a",
        "r-leg": "#ffcd3a"
    };

    // Initialize app
    async function initApp() {
        const userRef = db.ref("users/" + username);

        const snapshot = await userRef.once("value");

        if (!snapshot.exists()) {
            await userRef.set({
                currency: 100000,
                inventory: {
                    "Starter Pack": true
                },
                colors: defaultColors,
                equipped: {}
            });
        }

        const user = (await userRef.once("value")).val() || {};

        loadColors(user.colors || defaultColors);
        loadCatalog();
        updateInventoryUI(user.inventory || {}, user.equipped || {});
    }

    // Catalog
    function loadCatalog() {

        const items = [
            { name: "DynaDuck Logo T-Shirt", price: 25, slot: "torso", color: "#0055ff" },
            { name: "Admin Red Cap", price: 50, slot: "head", color: "#e3242b" },
            { name: "Sheldesky's Crown", price: 100000, slot: "head", color: "#ffd700" }
        ];

        const grid = document.querySelector(".center-section");
        grid.innerHTML = "";

        items.forEach(item => {

            const card = document.createElement("div");
            card.className = "item-card";

            card.innerHTML = `
                <div class="item-box">
                    <h4>${item.name.replace(/ /g, "<br>")}</h4>
                </div>
                <div class="item-btn">
                    <span class="btn-text-buy">Buy</span>
                    <span class="btn-text-price">${item.price.toLocaleString()} Dynamites</span>
                </div>
            `;

            card.querySelector(".item-btn").onclick = () => buyItem(item);

            grid.appendChild(card);

        });

    }

    // Purchase
    async function buyItem(item) {

        const userRef = db.ref("users/" + username);

        const snapshot = await userRef.once("value");

        const user = snapshot.val() || {
            currency: 0,
            inventory: {},
            colors: defaultColors,
            equipped: {}
        };

        if (user.inventory && user.inventory[item.name]) {
            alert("You already own this item.");
            return;
        }

        if (user.currency < item.price) {
            alert("Not enough Dynamites!");
            return;
        }

        await userRef.update({
            currency: user.currency - item.price,
            ["inventory/" + item.name]: {
                slot: item.slot,
                color: item.color
            }
        });

        alert("Purchased " + item.name + "!");

        const updated = (await userRef.once("value")).val() || {};
        updateInventoryUI(updated.inventory || {}, updated.equipped || {});

    }

    // Inventory
    function updateInventoryUI(inventory, equipped) {

        const container = document.querySelector(".inventory-grid");

        container.innerHTML = "";

        const itemNames = Object.keys(inventory).filter(name => name !== "Starter Pack");

        if (itemNames.length === 0) {
            const empty = document.createElement("div");
            empty.className = "inventory-item";
            empty.style.borderStyle = "dashed";
            empty.style.color = "#888";
            empty.textContent = "Empty";
            container.appendChild(empty);
            return;
        }

        itemNames.forEach(name => {

            const itemData = inventory[name];
            const slot = itemData && itemData.slot;
            const isEquipped = slot && equipped[slot] === name;

            const div = document.createElement("div");
            div.className = "inventory-item";
            div.textContent = name;

            if (isEquipped) {
                div.style.background = "#d4f8d4";
                div.style.borderColor = "#11AD36";
            }

            div.onclick = () => toggleEquip(name, itemData, equipped[slot] === name);

            container.appendChild(div);

        });

    }

    // Equip / unequip an owned item
    async function toggleEquip(itemName, itemData, currentlyEquipped) {

        if (!itemData || !itemData.slot) {
            return;
        }

        const userRef = db.ref("users/" + username);
        const slot = itemData.slot;

        if (currentlyEquipped) {
            // Unequip: clear the slot, restore default color
            await userRef.update({
                ["equipped/" + slot]: null,
                ["colors/" + slot]: defaultColors[slot]
            });
        } else {
            // Equip: set the slot, apply item's color
            await userRef.update({
                ["equipped/" + slot]: itemName,
                ["colors/" + slot]: itemData.color
            });
        }

        const updated = (await userRef.once("value")).val() || {};
        loadColors(updated.colors || defaultColors);
        updateInventoryUI(updated.inventory || {}, updated.equipped || {});

    }

    // Apply saved colors to the avatar on load
    function loadColors(colors) {
        Object.keys(colors).forEach(part => {
            const el = document.getElementById("part-" + part);
            if (el && colors[part]) {
                el.style.backgroundColor = colors[part];
            }
        });
    }

    // Avatar color editor — applies color and saves it to Firebase
    async function applyColor(hexColor) {
        const part = document.getElementById("bodyPartSelect").value;
        const el = document.getElementById("part-" + part);
        if (el) {
            el.style.backgroundColor = hexColor;
        }

        const userRef = db.ref("users/" + username);
        await userRef.update({
            ["colors/" + part]: hexColor
        });
    }

    window.onload = initApp;
  </script>

</body>
</html>
