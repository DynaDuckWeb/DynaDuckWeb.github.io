<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - DynaDuck</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html"><img src="logo.png" class="logo" alt="Logo"></a>
    <nav>
      <a href="catalog.html">Catalog</a>
      <a href="ideas.html">Ideas</a>
      <a href="create.html">Create</a>
      <a href="dynamites.html">Dynamites</a>
    </nav>
  </div>
  <div id="authButtons">
    <a href="login.html"><button class="green-btn">Log In</button></a>
  </div>
</header>

<div class="auth-container">
  <div class="auth-box">
    <h1>Create Account</h1>
    <form id="signupForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="green-btn">Sign Up</button>
    </form>
    <p>Already have an account? <a href="login.html">Log In</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDM3_vpaeh6e8ODIQGAwM1nmg3xsI6wPvI",
    authDomain: "dynaduck-305ae.firebaseapp.com",
    projectId: "dynaduck-305ae",
    databaseURL: "https://dynaduck-305ae-default-rtdb.firebaseio.com/",
    storageBucket: "dynaduck-305ae.firebasestorage.app",
    messagingSenderId: "1095752853036",
    appId: "1:1095752853036:web:bd47e8e3858417a0429389"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const user = document.getElementById('username').value.trim();
    const mail = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;

    // Save to Firebase
    db.ref('users/' + user).set({
      email: mail,
      password: pass,
      joinedDate: Date.now()
    }).then(() => {
      alert('Cloud Account Created!');
      window.location.href = 'login.html';
    });
  });
</script>
</body>
</html>
