<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - DynaDuck</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html"><img src="logo.png" class="logo" alt="Logo"></a>
    <nav>
      <a href="catalog.html">Catalog</a>
      <a href="ideas.html">Ideas</a>
      <a href="create.html">Create</a>
      <a href="dynamites.html">Dynamites</a>
    </nav>
  </div>
  <div id="authButtons">
    <a href="login.html"><button class="green-btn">Log In</button></a>
  </div>
</header>

<div class="auth-container">
  <div class="auth-box">
    <h1>Create Account</h1>
    <form id="signupForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="green-btn">Sign Up</button>
    </form>
    <p>Already have an account? <a href="login.html">Log In</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // 2. Your NEW Firebase Config (Corrected for Europe)
  const firebaseConfig = {
    apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
    authDomain: "dynaduck-19dbb.firebaseapp.com",
    databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "dynaduck-19dbb",
    storageBucket: "dynaduck-19dbb.firebasestorage.app",
    messagingSenderId: "777148453502",
    appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
  };

  // 3. Initialize Firebase
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.database();

  document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const user = document.getElementById('username').value.trim();
    const mail = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;

    // Save to Firebase
    db.ref('users/' + user).set({
      email: mail,
      password: pass,
      joinedDate: Date.now()
    }).then(() => {
      alert('Cloud Account Created!');
      window.location.href = 'login.html';
    });
  });
</script>
</body>
</html>
