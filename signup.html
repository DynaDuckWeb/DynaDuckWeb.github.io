<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - DynaDuck</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-box">
    <h1>Create Your Account</h1>
    <form id="signupForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="green-btn">Sign Up</button>
    </form>
    <p>Already have an account? <a href="login.html">Log In</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // YOUR CONFIG (The ID Card for your project)
  const firebaseConfig = {
    apiKey: "AIzaSyDM3_vpaeh6e8ODIQGAwM1nmg3xsI6wPvI",
    authDomain: "dynaduck-305ae.firebaseapp.com",
    projectId: "dynaduck-305ae",
    databaseURL: "https://dynaduck-305ae-default-rtdb.firebaseio.com/",
    storageBucket: "dynaduck-305ae.firebasestorage.app",
    messagingSenderId: "1095752853036",
    appId: "1:1095752853036:web:bd47e8e3858417a0429389"
  };

  // INITIALIZE
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // SIGN UP LOGIC
  const signupForm = document.getElementById('signupForm');

  signupForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    // CHECK IF USER EXISTS IN THE CLOUD
    db.ref('users/' + username).get().then((snapshot) => {
      if (snapshot.exists()) {
        alert('That username is taken in the cloud!');
      } else {
        // SAVE TO THE CLOUD
        db.ref('users/' + username).set({
          email: email,
          password: password,
          friends: "" // Empty for now
        }).then(() => {
          alert('Account created in the cloud! You can now log in.');
          window.location.href = 'login.html';
        });
      }
    });
  });
</script>
</body>
</html>
