<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
    }
    .auth-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .auth-box h1 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 2em;
      color: #333;
    }
    .auth-box input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      box-sizing: border-box;
      font-size: 1em;
      outline: none;
    }
    .auth-box input:focus {
      border-color: #11AD36;
    }
    .auth-box button {
      width: 100%;
      padding: 12px;
      font-size: 1.05em;
    }
    .auth-box p {
      margin-top: 20px;
      font-size: 0.9em;
      color: #666;
    }
    .auth-box p a {
      color: #11AD36;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-box p a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="index.html"><img src="logo.png" class="logo" alt="Logo"></a>
      <nav>
        <a href="catalog.html">Catalog</a>
        <a href="ideas.html">Ideas</a>
        <a href="create.html">Create</a>
        <a href="dynamites.html">Dynamites</a>
      </nav>
    </div>
    <div class="search-container">
      <input type="text" class="search-bar" placeholder="Search...">
    </div>
    <div id="authButtons">
      </div>
  </header>
  <div class="auth-container">
    <div class="auth-box">
      <h1>Create Account</h1>
      <form id="signupForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="green-btn">Sign Up</button>
      </form>
      <p>Already have an account? <a href="login.html">Log In</a></p>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
      authDomain: "dynaduck-19dbb.firebaseapp.com",
      databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "dynaduck-19dbb",
      storageBucket: "dynaduck-19dbb.firebasestorage.app",
      messagingSenderId: "777148453502",
      appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    function updateHeader() {
      const authDiv = document.getElementById('authButtons');
      const loggedInUser = localStorage.getItem('loggedInUser');
      if (loggedInUser) {
        authDiv.innerHTML = `
          <span style="color:white;font-weight:bold;margin-right:15px;">Welcome, ${loggedInUser}!</span>
          <a href="settings.html"><button class="green-btn">Settings</button></a>
          <button class="green-btn" onclick="logout()">Logout</button>
        `;
      } else {
        authDiv.innerHTML = `
          <a href="signup.html"><button class="green-btn">Sign Up</button></a>
          <a href="login.html"><button class="green-btn">Log In</button></a>
        `;
      }
    }
    function logout() {
      localStorage.removeItem('loggedInUser');
      localStorage.removeItem('isAdmin');
      updateHeader();
    }
    window.addEventListener('DOMContentLoaded', updateHeader);

    // ---------------------------------------------------------------------
    // MODERATION ENGINE
    // Goal: catch common bypass tricks (leetspeak, separators, lookalike
    // characters from other scripts, accents, repeated-letter spam,
    // zero-width characters) by normalizing the username down to a plain
    // a-z string BEFORE running it against the banned word list.
    //
    // Note: this is a stronger filter, not an unbeatable one. Any
    // client-side keyword list can eventually be bypassed (creative
    // spacing, new lookalikes, etc). For real coverage you'd also want
    // server-side checks (Firebase Security Rules / Cloud Function) so
    // people can't just edit the JS to skip this entirely - see comment
    // at the bottom of this script for more.
    // ---------------------------------------------------------------------

    // Lookalike characters from other scripts/symbol sets that visually or
    // phonetically resemble Latin letters. Mapped back to their Latin
    // equivalent before matching.
    const LOOKALIKE_MAP = {
      // Cyrillic
      "а": "a", "А": "a", "в": "b", "В": "b", "с": "c", "С": "c",
      "е": "e", "Е": "e", "н": "h", "Н": "h", "і": "i", "І": "i",
      "к": "k", "К": "k", "м": "m", "М": "m", "о": "o", "О": "o",
      "р": "p", "Р": "p", "т": "t", "Т": "t", "х": "x", "Х": "x",
      "у": "y", "У": "y", "ѕ": "s", "Ѕ": "s", "г": "r", "Г": "r",
      "ӓ": "a", "ё": "e",
      // Greek
      "α": "a", "Α": "a", "β": "b", "Β": "b", "ε": "e", "Ε": "e",
      "ι": "i", "Ι": "i", "κ": "k", "Κ": "k", "ο": "o", "Ο": "o",
      "ρ": "p", "Ρ": "p", "τ": "t", "Τ": "t", "υ": "y", "Υ": "y",
      "χ": "x", "Χ": "x", "ν": "v", "Ν": "n",
      // Fullwidth / common symbol lookalikes
      "ⓐ": "a", "ⓑ": "b", "ⓒ": "c", "ⓓ": "d", "ⓔ": "e", "ⓖ": "g",
      "ⓘ": "i", "ⓛ": "l", "ⓞ": "o", "ⓡ": "r", "ⓣ": "t", "ⓨ": "y",
      // Leetspeak / common substitutions
      "4": "a", "@": "a", "8": "b", "3": "e", "€": "e", "9": "g",
      "1": "i", "!": "i", "|": "i", "0": "o", "5": "s", "$": "s",
      "7": "t", "+": "t", "2": "z"
    };

    function normalizeForModeration(input) {
      let s = input;

      // Strip zero-width and other invisible/formatting characters used to
      // split up banned words (e.g. "f\u200Buck").
      s = s.replace(/[\u200B-\u200F\u202A-\u202E\uFEFF]/g, "");

      // Decompose accented Latin letters and strip the accent marks
      // (café -> cafe, fück -> fuck).
      s = s.normalize("NFKD").replace(/[\u0300-\u036f]/g, "");

      s = s.toLowerCase();

      // Map known lookalike characters back to plain Latin letters.
      s = s.split("").map(ch => LOOKALIKE_MAP[ch] || ch).join("");

      // Strip separators people use to break up a word (f.u.c.k, f_u-c.k,
      // f u c k) - anything that isn't a-z or a digit at this point.
      s = s.replace(/[^a-z0-9]/g, "");

      // Collapse runs of 3+ repeated characters down to 1
      // (fuuuuuck -> fuck, ssshit -> shit) without merging intentional
      // doubled letters in normal words.
      s = s.replace(/(.)\1{2,}/g, "$1");

      return s;
    }

    const usernameRegex = /^[a-zA-Z0-9_]+$/;

    const bannedWords = [
      "gay", "lesbian", "bi", "bisexual", 
      "nigga", "nigger", "fag", "faggot", "retard",
      "fuck", "shit", "bitch", "asshole", "dick", "pussy", "cunt", "idiot", "trash",
      "discord", "discord.gg", "https", "http", ".com", ".net", ".org", "invite",
      "youtube", "yt", "tiktok", "instagram", "insta", "twitch", "twitter", "x.com"
    ].map(normalizeForModeration);

    const reservedWords = ["admin", "system", "dynaduck"].map(normalizeForModeration);

    function isUsernameBlocked(rawUsername) {
      const normalized = normalizeForModeration(rawUsername);

      for (const word of reservedWords) {
        if (normalized.includes(word)) {
          return "You cannot register usernames containing 'Admin', 'System', or 'DynaDuck'.";
        }
      }

      for (const word of bannedWords) {
        if (normalized.includes(word)) {
          return "This username contains restricted text or social media terms. Please choose another.";
        }
      }

      return null;
    }

    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const mail = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;

      if (user.length < 3 || user.length > 15) {
        alert("Username must be between 3 and 15 characters long!");
        return;
      }
      if (!usernameRegex.test(user)) {
        alert("Usernames can only contain letters, numbers, and underscores!");
        return;
      }

      const blockReason = isUsernameBlocked(user);
      if (blockReason) {
        alert(blockReason);
        return;
      }

      db.ref('users/' + user).get().then((snapshot) => {
        if (snapshot.exists()) {
          alert('This username is already taken! Please choose a different one.');
        } else {
          db.ref('users/' + user).set({
            email: mail,
            password: pass,
            currency: 100, 
            joinedDate: Date.now()
          }).then(() => {
            alert('Cloud Account Created Successfully!');
            window.location.href = 'login.html';
          });
        }
      }).catch((error) => {
        console.error(error);
        alert("Verification failed against server endpoints.");
      });
    });

    // ---------------------------------------------------------------------
    // IMPORTANT LIMITATION:
    // This entire check runs in the visitor's browser. Anyone can open dev
    // tools and call db.ref('users/...').set(...) directly, skipping this
    // form (and this filter) completely. The same applies to anyone who
    // disables JavaScript or edits the page locally before submitting.
    //
    // A determined person can always bypass a purely client-side filter.
    // The only way to actually enforce this is server-side, e.g. with
    // Firebase Realtime Database Security Rules that validate the
    // username against a pattern, or a Cloud Function that runs this same
    // normalization + check before allowing the write. Happy to help set
    // that up if you want real enforcement instead of just a UI nicety.
    // ---------------------------------------------------------------------
  </script>
</body>
</html>
