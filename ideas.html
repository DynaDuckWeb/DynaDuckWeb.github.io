<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DynaDuck - Ideas</title>
<link rel="stylesheet" href="style.css">

<style>
body { font-family:'Poppins', sans-serif; margin:0; padding:0; background:#f2f2f2; color:#222; }

header { display:flex; align-items:center; justify-content:space-between; background:#333; padding:15px 40px; }
.header-left { display:flex; align-items:center; gap:20px; }
.logo { height:70px; cursor:pointer; }
nav { display:flex; gap:25px; }
nav a { text-decoration:none; color:white; font-weight:600; font-size:1.05em; transition:0.2s; }
nav a:hover { color:#11AD36; }

.search-container { flex:1; display:flex; justify-content:center; }
.search-bar { width:320px; padding:10px 12px; border-radius:8px; border:none; outline:none; font-size:1em; }

.green-btn {
  background:#11AD36;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-size:1em;
  transition:0.2s;
}
.green-btn:hover { background:#0E8E2C; }

#authButtons { display:flex; gap:15px; align-items:center; }

.main-container { max-width:900px; margin:40px auto; padding:0 20px; }
.center-message { text-align:center; margin-top:100px; font-size:1.8em; font-weight:bold; color:#555; }

.idea-input {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
  margin-bottom:30px;
}

.idea-input textarea,
.idea-input input[type="text"] {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:10px;
  resize:none;
}

.idea {
  background:white;
  padding:15px 20px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

.idea h3 { margin:0 0 5px 0; }
.idea .meta { font-size:0.85em; color:#11AD36; font-weight:600; margin-bottom:8px; }

.idea .actions {
  display:flex;
  gap:10px;
  margin-top:10px;
}

#adminReports {
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  margin-top:40px;
}

.report-card {
  border:1px solid #ccc;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;
  background:#fafafa;
}

.report-actions {
  display:flex;
  gap:10px;
  margin-top:5px;
}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <img src="logo.png" class="logo" alt="Logo">
    <nav>
      <a href="catalog.html">Catalog</a>
      <a href="ideas.html">Ideas</a>
      <a href="create.html">Create</a>
      <a href="dynamites.html">Dynamites</a>
    </nav>
  </div>

  <div class="search-container">
    <input type="text" class="search-bar" placeholder="Search...">
  </div>

  <div id="authButtons"></div>
</header>

<div class="main-container">

  <div id="notLoggedIn" class="center-message">
    MAKE AN ACCOUNT TO ACCESS THIS PAGE :3
  </div>

  <div id="ideasContent" style="display:none;">

    <div class="idea-input">
      <input type="text" id="ideaTitle" placeholder="Idea title">
      <textarea id="ideaDesc" rows="3" placeholder="Idea description"></textarea>
      <button class="green-btn" onclick="addIdea()">Add Idea</button>
    </div>

    <div class="actions" style="margin-bottom:20px;">
      <button class="green-btn" onclick="sortIdeas('likes')">Sort by Likes</button>
      <button class="green-btn" onclick="sortIdeas('newest')">Sort by Newest</button>
    </div>

    <div id="ideasList"></div>

    <div id="adminReports" style="display:none;">
      <h2>Reported Ideas (Admin)</h2>
      <div id="reportsContainer"></div>
    </div>

  </div>
</div>

<script>
/* ================= FIREBASE INIT ================= */

const firebaseConfig = {
  apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
  authDomain: "dynaduck-19dbb.firebaseapp.com",
  databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dynaduck-19dbb",
  storageBucket: "dynaduck-19dbb.firebasestorage.app",
  messagingSenderId: "777148453502",
  appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= MODERATION FILTER ================= */

const bannedWords = [
  "fuck","shit","bitch","asshole",
  "nigger","fag","retard",

  "my age is","i am years old","i live in","my address",
  "instagram","snapchat","discord","tiktok","@"
];

function isBlocked(text) {
  const lower = text.toLowerCase();
  return bannedWords.some(w => lower.includes(w));
}

/* ================= AUTH ================= */

function updateHeader() {
  const authDiv = document.getElementById("authButtons");
  let user = localStorage.getItem("loggedInUser");

  if (!user) user = null;

  if (user) {
    authDiv.innerHTML = `
      <span style="color:white;font-weight:bold;margin-right:10px;">${user}</span>
      <button class="green-btn" onclick="logout()">Logout</button>
    `;

    document.getElementById("notLoggedIn").style.display = "none";
    document.getElementById("ideasContent").style.display = "block";

    loadPosts();
    if (user === "Admin") loadReports();

  } else {
    authDiv.innerHTML = `
      <a href="login.html"><button class="green-btn">Log In</button></a>
      <a href="signup.html"><button class="green-btn">Sign Up</button></a>
    `;

    document.getElementById("notLoggedIn").style.display = "block";
    document.getElementById("ideasContent").style.display = "none";
  }
}

function logout() {
  localStorage.removeItem("loggedInUser");
  location.reload();
}

window.addEventListener("DOMContentLoaded", updateHeader);

/* ================= CREATE POST ================= */

function addPost() {
  const title = document.getElementById("ideaTitle").value.trim();
  const text = document.getElementById("ideaDesc").value.trim();
  const user = localStorage.getItem("loggedInUser");

  if (!user) return alert("Login required");
  if (!title || !text) return alert("Fill all fields");

  if (isBlocked(title + " " + text)) {
    alert("Blocked content detected.");
    return;
  }

  const postId = db.ref().child("posts").push().key;

  db.ref("posts/" + postId).set({
    title,
    text,
    user,
    timestamp: Date.now()
  });

  document.getElementById("ideaTitle").value = "";
  document.getElementById("ideaDesc").value = "";
}

/* ================= LOAD POSTS ================= */

function loadPosts() {
  const container = document.getElementById("ideasList");

  db.ref("posts").on("value", snap => {
    container.innerHTML = "";

    snap.forEach(postSnap => {
      const post = postSnap.val();
      const id = postSnap.key;

      const div = document.createElement("div");
      div.className = "idea";

      div.innerHTML = `
        <h3>${post.title}</h3>
        <div class="meta">By ${post.user}</div>
        <p>${post.text}</p>

        <div class="actions">
          <button class="green-btn" onclick="toggleReply('${id}')">Reply</button>
          <button class="green-btn" onclick="reportPost('${id}')">Report</button>
        </div>

        <div id="replies-${id}" style="margin-top:10px;"></div>

        <div id="replyBox-${id}" style="display:none; margin-top:10px;">
          <input id="replyInput-${id}" style="width:100%;padding:8px;" placeholder="Write reply...">
          <button class="green-btn" onclick="addReply('${id}')">Send</button>
        </div>
      `;

      container.appendChild(div);

      loadReplies(id);
    });
  });
}

/* ================= REPLIES ================= */

function toggleReply(id) {
  const box = document.getElementById("replyBox-" + id);
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function addReply(postId) {
  const input = document.getElementById("replyInput-" + postId);
  const text = input.value.trim();
  const user = localStorage.getItem("loggedInUser");

  if (!user) return alert("Login required");
  if (!text) return;

  if (isBlocked(text)) {
    alert("Blocked content detected.");
    return;
  }

  const replyId = db.ref().child("replies").push().key;

  db.ref("replies/" + postId + "/" + replyId).set({
    user,
    text,
    timestamp: Date.now()
  });

  input.value = "";
}

function loadReplies(postId) {
  db.ref("replies/" + postId).on("value", snap => {
    const container = document.getElementById("replies-" + postId);
    container.innerHTML = "";

    snap.forEach(r => {
      const reply = r.val();

      const div = document.createElement("div");
      div.style.borderTop = "1px solid #ddd";
      div.style.padding = "5px";

      div.innerHTML = `<b>${reply.user}:</b> ${reply.text}`;

      container.appendChild(div);
    });
  });
}

/* ================= REPORT SYSTEM ================= */

function reportPost(postId) {
  const reason = prompt("Why are you reporting?");
  if (!reason) return;

  const user = localStorage.getItem("loggedInUser");
  if (!user) return alert("Login required");

  const reportId = db.ref().child("reports").push().key;

  db.ref("reports/" + reportId).set({
    postId,
    reporter: user,
    reason,
    timestamp: Date.now()
  });

  alert("Reported!");
}

/* ================= ADMIN PANEL ================= */

function loadReports() {
  const user = localStorage.getItem("loggedInUser");
  if (user !== "Admin") return;

  document.getElementById("adminReports").style.display = "block";

  const container = document.getElementById("reportsContainer");

  db.ref("reports").on("value", snap => {
    container.innerHTML = "";

    snap.forEach(repSnap => {
      const rep = repSnap.val();
      const repId = repSnap.key;

      db.ref("posts/" + rep.postId).get().then(postSnap => {
        if (!postSnap.exists()) return;

        const post = postSnap.val();

        const div = document.createElement("div");
        div.className = "report-card";

        div.innerHTML = `
          <p><b>Reporter:</b> ${rep.reporter}</p>
          <p><b>Reason:</b> ${rep.reason}</p>
          <p><b>Post:</b> ${post.title}</p>

          <div class="report-actions">
            <button class="green-btn" onclick="deletePost('${rep.postId}','${repId}')">Delete Post</button>
            <button class="green-btn" style="background:#ccc" onclick="dismissReport('${repId}')">Dismiss</button>
          </div>
        `;

        container.appendChild(div);
      });
    });
  });
}

/* ================= DELETE / DISMISS ================= */

function deletePost(postId, reportId) {
  db.ref("posts/" + postId).remove();
  db.ref("replies/" + postId).remove();
  db.ref("reports/" + reportId).remove();
}

function dismissReport(reportId) {
  db.ref("reports/" + reportId).remove();
}
</script>
</body>
</html>
