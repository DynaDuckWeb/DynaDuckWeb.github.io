<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Baseplate - DynaDuck</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Specific styles for the Game Page */
    .game-main {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .game-preview-box {
      width: 450px;
      height: 300px;
      background-color: #339933; /* Classic Green */
      /* This CSS trick creates the "Studs" look */
      background-image: radial-gradient(#2a882a 15%, transparent 15%);
      background-size: 30px 30px;
      border: 5px solid #333;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-preview-box h2 {
      color: white;
      font-family: 'Verdana', sans-serif;
      text-shadow: 2px 2px #000;
      font-size: 3em;
      letter-spacing: 2px;
    }

    .play-section {
      text-align: center;
      flex: 1;
    }

    .play-section h1 {
      margin-top: 0;
      font-size: 2.2em;
    }

    .big-play-btn {
      background: #11AD36;
      color: white;
      border: none;
      padding: 20px 80px;
      border-radius: 12px;
      font-size: 2em;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 0 #0E8E2C;
      transition: 0.1s;
      width: 100%;
    }

    .big-play-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0E8E2C;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html"><img src="logo.png" class="logo" alt="Logo"></a>
    <nav>
      <a href="catalog.html">Catalog</a>
      <a href="ideas.html">Ideas</a>
      <a href="create.html">Create</a>
    </nav>
  </div>
  <div id="authButtons"></div>
</header>

<main class="game-main">
  <div class="game-preview-box">
    <h2>STUDPVP</h2>
  </div>

  <div class="play-section">
    <h1>Baseplate</h1>
    <p style="color: #666; margin-bottom: 30px;">Created by: <b>DynaDuck</b></p>
    
    <button class="big-play-btn" onclick="joinGame()">PLAY</button>
    
    <p id="statusMsg" style="margin-top: 20px; font-weight: bold; color: #11AD36;"></p>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // YOUR NEW CONFIG (Corrected for Europe West)
  const firebaseConfig = {
    apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
    authDomain: "dynaduck-19dbb.firebaseapp.com",
    databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "dynaduck-19dbb",
    storageBucket: "dynaduck-19dbb.firebasestorage.app",
    messagingSenderId: "777148453502",
    appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
  };

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.database();

  // CHECK LOGIN STATUS FOR HEADER
  function checkLogin() {
    const user = localStorage.getItem('loggedInUser');
    const authDiv = document.getElementById('authButtons');
    if(user) {
      authDiv.innerHTML = `<span style="color:white; margin-right:10px;">Hi, ${user}!</span><button class="green-btn" onclick="logout()">Logout</button>`;
    } else {
      authDiv.innerHTML = `<a href="login.html"><button class="green-btn">Log In</button></a>`;
    }
  }

  function logout() {
    localStorage.removeItem('loggedInUser');
    location.reload();
  }

  // PLAY BUTTON LOGIC
  function joinGame() {
    const user = localStorage.getItem('loggedInUser');
    if(!user) {
      alert("Please log in to join the Baseplate!");
      window.location.href = "login.html";
      return;
    }

    document.getElementById('statusMsg').innerText = "Starting DynaDuck Engine...";
    
    // Logic to tell Firebase you are playing
    db.ref('active_players/' + user).set({
      location: "Baseplate",
      last_seen: Date.now()
    });

    // In a real setup, this would trigger your C++ URI scheme (dynaduck://join/1)
    setTimeout(() => {
        alert("Connecting to Server...");
    }, 1000);
  }

  window.onload = checkLogin;
</script>

</body>
</html>
