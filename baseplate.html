<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Baseplate - DynaDuck Launcher</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Classic 2007 Game Page Layout */
    .game-container {
      max-width: 1000px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
      padding: 0 20px;
    }

    .game-viewport {
      background: #339933;
      height: 400px;
      border: 6px solid #333;
      border-radius: 12px;
      position: relative;
      background-image: radial-gradient(#2a882a 15%, transparent 15%);
      background-size: 30px 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewport-overlay {
      color: white;
      text-align: center;
      font-family: 'Verdana', sans-serif;
      text-shadow: 3px 3px 0px #000;
    }

    .play-panel {
      background: white;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid #ddd;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    .big-play-btn {
      background: #11AD36;
      color: white;
      width: 100%;
      padding: 20px;
      font-size: 2.5em;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 0 #0E8E2C;
      margin-bottom: 20px;
    }

    .big-play-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0E8E2C;
    }

    .player-list-preview {
      margin-top: 20px;
      text-align: left;
      background: #f4f4f4;
      padding: 15px;
      border-radius: 8px;
    }

    .status-tag {
      font-size: 0.7em;
      padding: 2px 6px;
      border-radius: 4px;
      background: #e0e0e0;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html"><img src="logo.png" class="logo" alt="Logo"></a>
    <nav>
      <a href="catalog.html">Catalog</a>
      <a href="ideas.html">Ideas</a>
      <a href="create.html">Create</a>
    </nav>
  </div>
  <div id="authButtons"></div>
</header>

<div class="game-container">
  <div class="game-viewport">
    <div class="viewport-overlay">
      <h1 style="font-size: 4em; margin: 0;">BASEPLATE</h1>
      <p>Multiplayer Enabled</p>
    </div>
  </div>

  <div class="play-panel">
    <button class="big-play-btn" onclick="launchMultiplayer()">PLAY</button>
    
    <div class="player-list-preview">
      <strong style="color: #666; font-size: 0.8em;">PLAYERS IN-GAME</strong>
      <hr>
      <div id="activePlayerList">
        <p style="color:#999; font-size: 0.9em;">Looking for players...</p>
      </div>
    </div>
    
    <p id="launchStatus" style="margin-top:15px; font-weight:bold; color:#11AD36;"></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
    authDomain: "dynaduck-19dbb.firebaseapp.com",
    databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "dynaduck-19dbb",
    storageBucket: "dynaduck-19dbb.firebasestorage.app",
    messagingSenderId: "777148453502",
    appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
  };

  if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
  const db = firebase.database();
  const user = localStorage.getItem('loggedInUser');

  // 1. UPDATE HEADER
  function updateHeader() {
    const authDiv = document.getElementById('authButtons');
    if(user) {
      authDiv.innerHTML = `<span style="color:white;margin-right:10px;">${user}</span><button class="green-btn" onclick="localStorage.removeItem('loggedInUser');location.reload();">Logout</button>`;
    } else {
      authDiv.innerHTML = `<a href="login.html"><button class="green-btn">Log In</button></a>`;
    }
  }

  // 2. LIVE PLAYERLIST LOGIC (For Website and C++ Sync)
  function syncPlayerList() {
    const listDiv = document.getElementById('activePlayerList');
    
    // Listen to the WORLD folder
    db.ref('worlds/baseplate_01/players').on('value', (snapshot) => {
      listDiv.innerHTML = "";
      const players = snapshot.val();
      
      if (!players) {
        listDiv.innerHTML = "<p style='color:#999;'>Baseplate is empty.</p>";
        return;
      }

      Object.keys(players).forEach(name => {
        const pData = players[name];
        listDiv.innerHTML += `
          <div style="margin-bottom:5px; display:flex; align-items:center;">
            <div style="width:8px; height:8px; background:#11AD36; border-radius:50%; margin-right:8px;"></div>
            <strong>${name}</strong>
            <span class="status-tag">${pData.status || 'In-Game'}</span>
          </div>
        `;
      });
    });
  }

  // 3. THE LAUNCHER HANDSHAKE
  function launchMultiplayer() {
    if (!user) {
      alert("Please log in to join multiplayer!");
      window.location.href = "login.html";
      return;
    }

    const statusMsg = document.getElementById('launchStatus');
    statusMsg.innerText = "Connecting to Cloud...";

    // STEP A: Register in the Cloud Playerlist
    // Your C++ engine will look for this exact folder!
    const playerRef = db.ref('worlds/baseplate_01/players/' + user);
    
    playerRef.set({
      status: "Connecting...",
      x: 0, 
      y: 4, 
      z: 0,
      r: 0,
      lastUpdate: Date.now()
    }).then(() => {
      // STEP B: Set up "Auto-Delete" if they crash or leave
      playerRef.onDisconnect().remove();

      // STEP C: Call the C++ Protocol
      statusMsg.innerText = "Launching DynaDuck Engine...";
      window.location.href = `dynaduck://user=${user}&place=baseplate_01`;
    });
  }

  window.onload = () => {
    updateHeader();
    syncPlayerList();
  };
</script>

</body>
</html>
