<!DOCTYPE html>
<html>
<head>
    <title>BoomBoom Client</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        canvas { border: 2px solid white; background: #222; cursor: none; }
        body { background: #111; color: white; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>
    <h1>BoomBoom.exe Online</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const config = { databaseURL: "https://dynaduck-305ae-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Identify this player
        const myName = "Player_" + Math.floor(Math.random() * 1000);
        const playerRef = db.ref('worlds/baseplate01/players/' + myName);

        // 1. Send RAW input to server
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            playerRef.update({
                raw_x: e.clientX - rect.left,
                raw_y: e.clientY - rect.top,
                status: "Moving"
            });
        });

        playerRef.onDisconnect().remove();

        // 2. Draw EVERYONE based on the Server's official data
        db.ref('worlds/baseplate01/players').on('value', (snapshot) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            snapshot.forEach((child) => {
                const data = child.val();
                
                // Draw character
                ctx.fillStyle = (child.key === myName) ? "#00FF00" : "#FF0000";
                ctx.fillRect(data.x - 10, data.y - 10, 20, 20);
                
                // Draw name tag
                ctx.fillStyle = "white";
                ctx.fillText(child.key, data.x - 15, data.y - 15);
            });
        });
    </script>
</body>
</html>
