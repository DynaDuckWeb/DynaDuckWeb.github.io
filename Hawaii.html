<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Sweet in Sea Major</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0d0d;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; 
            overflow: hidden;
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .text-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10; 
            pointer-events: none;
        }

        h1 {
            color: #161616;
            font-family: 'Georgia', serif;
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-align: center;
            padding: 0 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.25);
        }

        /* Diagnostic Debug Box */
        #debug-status {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background: rgba(255, 0, 0, 0.85);
            color: #fff;
            padding: 10px 15px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 4px;
            z-index: 100;
            display: block;
        }
    </style>
</head>
<body>

    <div id="debug-status">Status: Checking video file...</div>

    <div class="video-background">
        <video autoplay loop muted playsinline id="bg-video">
            <source src="Hawaii.mp4" type="video/mp4">
        </video>
    </div>

    <main class="text-overlay">
        <h1>Dream Sweet in Sea Major</h1>
    </main>

    <script>
        const video = document.getElementById('bg-video');
        const debug = document.getElementById('debug-status');

        video.onplaying = function() {
            debug.style.backgroundColor = "rgba(0, 200, 0, 0.85)";
            debug.innerText = "Status: Video playing perfectly backgrounded.";
            setTimeout(() => { debug.style.display = 'none'; }, 3000);
        };

        video.onerror = function() {
            debug.innerText = "Error: Cannot find 'Hawaii.mp4'. Check your file name and folder.";
        };

        window.addEventListener('DOMContentLoaded', () => {
            video.play().catch(error => {
                debug.innerText = "Status: Browser blocked autoplay. Click anywhere on the screen to force play.";
                document.body.style.cursor = "pointer";
                
                document.body.addEventListener('click', () => {
                    video.play();
                    document.body.style.cursor = "default";
                }, { once: true });
            });
        });
    </script>

</body>
</html>
