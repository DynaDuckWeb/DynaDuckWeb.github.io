<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log In - DynaDuck</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-box">
    <h1>Log In</h1>
    <form id="loginForm">
      <input type="text" id="loginUsername" placeholder="Username" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit" class="green-btn">Log In</button>
    </form>
    <p>Don’t have an account? <a href="signup.html">Sign Up</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // 2. Your NEW Firebase Config (Corrected for Europe)
  const firebaseConfig = {
    apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
    authDomain: "dynaduck-19dbb.firebaseapp.com",
    databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "dynaduck-19dbb",
    storageBucket: "dynaduck-19dbb.firebasestorage.app",
    messagingSenderId: "777148453502",
    appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
  };

  // 3. Initialize Firebase
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.database();


  const loginForm = document.getElementById('loginForm');

  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;

    // ASK THE CLOUD: "Does this user exist?"
    db.ref('users/' + username).get().then((snapshot) => {
      if (snapshot.exists()) {
        const userData = snapshot.val();
        
        // CHECK IF PASSWORD MATCHES
        if (userData.password === password) {
          alert('Logged in successfully via Cloud!');
          
          // Remember who is logged in on THIS browser
          localStorage.setItem('loggedInUser', username);
          
          window.location.href = 'index.html';
        } else {
          alert('Incorrect password!');
        }
      } else {
        alert('User does not exist in the cloud!');
      }
    }).catch((error) => {
      console.error(error);
      alert("Error connecting to Firebase!");
    });
  });
</script>
</body>
</html>
