<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log In - DynaDuck</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
    }
    .auth-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .auth-box h1 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 2em;
      color: #333;
    }
    .auth-box input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      box-sizing: border-box;
      font-size: 1em;
      outline: none;
    }
    .auth-box input:focus {
      border-color: #11AD36;
    }
    .auth-box button {
      width: 100%;
      padding: 12px;
      font-size: 1.05em;
    }
    .auth-box p {
      margin-top: 20px;
      font-size: 0.9em;
      color: #666;
    }
    .auth-box p a {
      color: #11AD36;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-box p a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <img src="logo.png" class="logo" alt="DynaDuck" onclick="window.location.href='index.html'">
      <nav>
        <a href="catalog.html">Catalog</a>
        <a href="ideas.html">Ideas</a>
        <a href="create.html">Create</a>
        <a href="dynamites.html">Dynamites</a>
      </nav>
    </div>

    <div class="search-container">
      <input type="text" class="search-bar" placeholder="Search...">
    </div>

    <div id="authButtons">
      </div>
  </header>

  <div class="auth-container">
    <div class="auth-box">
      <h1>Log In</h1>
      <form id="loginForm">
        <input type="text" id="loginUsername" placeholder="Username" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit" class="green-btn">Log In</button>
      </form>
      <p>Don’t have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtxYw55qR1wO3fw3EBivVhz4XI_H7GzvQ",
      authDomain: "dynaduck-19dbb.firebaseapp.com",
      databaseURL: "https://dynaduck-19dbb-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "dynaduck-19dbb",
      storageBucket: "dynaduck-19dbb.firebasestorage.app",
      messagingSenderId: "777148453502",
      appId: "1:777148453502:web:2f67ac439ec29dc4fc3e2f"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // DYNAMIC HEADER ENGINE
    function updateHeader() {
      const authDiv = document.getElementById('authButtons');
      const loggedInUser = localStorage.getItem('loggedInUser');

      if (loggedInUser) {
        authDiv.innerHTML = `
          <span style="color:white;font-weight:bold;margin-right:15px;">Welcome, ${loggedInUser}!</span>
          <a href="settings.html"><button class="green-btn">Settings</button></a>
          <button class="green-btn" onclick="logout()">Logout</button>
        `;
      } else {
        authDiv.innerHTML = `
          <a href="signup.html"><button class="green-btn">Sign Up</button></a>
          <a href="login.html"><button class="green-btn">Log In</button></a>
        `;
      }
    }

    function logout() {
      localStorage.removeItem('loggedInUser');
      localStorage.removeItem('isAdmin');
      updateHeader();
    }

    window.addEventListener('DOMContentLoaded', updateHeader);

    // LOGIN PROCESS WITH SECURITY MODERATION
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      const usernameRegex = /^[a-zA-Z0-9_]+$/;
      const lowerUser = username.toLowerCase();
      
      const bannedWords = [
        "gay", "lesbian", "bi", "bisexual", 
        "nigga", "nigger", "fag", "faggot", "retard",
        "fuck", "shit", "bitch", "asshole", "dick", "pussy", "cunt", "idiot", "trash",
        "discord", "discord.gg", "https", "http", ".com", ".net", ".org", "invite",
        "youtube", "yt", "tiktok", "instagram", "insta", "twitch", "twitter", "x.com"
      ];

      if (username.length < 3 || username.length > 15) {
        alert("Username must be between 3 and 15 characters long!");
        return;
      }

      if (!usernameRegex.test(username)) {
        alert("Usernames can only contain letters, numbers, and underscores!");
        return;
      }

      if ((lowerUser.includes("admin") || lowerUser.includes("system") || lowerUser.includes("dynaduck")) && username !== "Admin") {
        alert("You cannot log into system reserved usernames!");
        return;
      }

      for (let word of bannedWords) {
        if (lowerUser.includes(word)) {
          alert("Username contains restricted language!");
          return;
        }
      }
      db.ref('users/' + username).get().then((snapshot) => {
        if (snapshot.exists()) {
          const userData = snapshot.val();
          if (userData.password === password) {
            alert('Logged in successfully!');
            localStorage.setItem('loggedInUser', username);
            if (username === "Admin") {
              localStorage.setItem('isAdmin', 'true');
            } else {
              localStorage.removeItem('isAdmin');
            }
            window.location.href = 'index.html';
          } else {
            alert('Incorrect password!');
          }
        } else {
          alert('User does not exist in the cloud!');
        }
      }).catch((error) => {
        console.error(error);
        alert("Error connecting to Firebase!");
      });
    });
  </script>
</body>
</html>
