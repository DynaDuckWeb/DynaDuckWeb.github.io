<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log In - DynaDuck</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-box">
    <h1>Log In</h1>
    <form id="loginForm">
      <input type="text" id="loginUsername" placeholder="Username" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit" class="green-btn">Log In</button>
    </form>
    <p>Don’t have an account? <a href="signup.html">Sign Up</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // YOUR CONFIG (Must be the same as Sign Up)
  const firebaseConfig = {
    apiKey: "AIzaSyDM3_vpaeh6e8ODIQGAwM1nmg3xsI6wPvI",
    authDomain: "dynaduck-305ae.firebaseapp.com",
    projectId: "dynaduck-305ae",
    databaseURL: "https://dynaduck-305ae-default-rtdb.firebaseio.com/",
    storageBucket: "dynaduck-305ae.firebasestorage.app",
    messagingSenderId: "1095752853036",
    appId: "1:1095752853036:web:bd47e8e3858417a0429389"
  };

  // INITIALIZE
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const loginForm = document.getElementById('loginForm');

  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;

    // ASK THE CLOUD: "Does this user exist?"
    db.ref('users/' + username).get().then((snapshot) => {
      if (snapshot.exists()) {
        const userData = snapshot.val();
        
        // CHECK IF PASSWORD MATCHES
        if (userData.password === password) {
          alert('Logged in successfully via Cloud!');
          
          // Remember who is logged in on THIS browser
          localStorage.setItem('loggedInUser', username);
          
          window.location.href = 'index.html';
        } else {
          alert('Incorrect password!');
        }
      } else {
        alert('User does not exist in the cloud!');
      }
    }).catch((error) => {
      console.error(error);
      alert("Error connecting to Firebase!");
    });
  });
</script>
</body>
</html>
