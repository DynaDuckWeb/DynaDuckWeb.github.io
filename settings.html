<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <img src="logo.png" class="logo" alt="Logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="catalog.html">Catalog</a>
    </nav>
  </div>
</header>

<div class="auth-container">
  <div class="auth-box">
    <h1>Settings</h1>
    <form id="settingsForm">
      <input type="text" id="displayName" placeholder="Display Name">
      <input type="password" id="currentPassword" placeholder="Current Password (required to delete)">
      <input type="password" id="newPassword" placeholder="New Password">
      <input type="email" id="confirmEmail" placeholder="Confirm Email">
      <button type="submit" class="green-btn">Save Changes</button>
    </form>
    <button class="green-btn" id="deleteAccountBtn" style="margin-top:15px;background:#E74C3C;">Delete Account</button>
    <br><br>
    <a href="index.html" class="green-btn" style="text-decoration:none;">Back to Home</a>
  </div>
</div>

<script type="module">
import { auth, getProfileByUid, updateProfileDisplayName, changePassword, deleteAccountWithReauth } from './firebase-init.js';

(async function init(){
  const user = auth.currentUser;
  if(!user){
    alert('Please log in to access settings.');
    window.location.href = 'login.html';
    return;
  }
})();

const settingsForm = document.getElementById('settingsForm');
settingsForm.addEventListener('submit', async function(e){
  e.preventDefault();
  const displayName = document.getElementById('displayName').value.trim();
  const newPassword = document.getElementById('newPassword').value;
  const confirmEmail = document.getElementById('confirmEmail').value.trim();

  try {
    if(displayName) await updateProfileDisplayName(displayName);
    if(newPassword) await changePassword(newPassword);
    if(confirmEmail) {
      // update email -> requires reauth in production (not handled here)
      // optional: implement updateEmail with reauth
      alert('Email change is not fully implemented in this example. Update email in Firebase console or implement reauth flow.');
    }
    alert('Settings updated!');
    document.getElementById('displayName').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmEmail').value = '';
  } catch (err) {
    alert('Failed to update settings: ' + err.message);
  }
});

document.getElementById('deleteAccountBtn').addEventListener('click', async () => {
  const currentPassword = document.getElementById('currentPassword').value;
  if(!currentPassword) return alert('Enter your current password to delete account.');
  if(!confirm('Are you sure you want to delete your account? This is permanent.')) return;
  try {
    await deleteAccountWithReauth(currentPassword);
    alert('Your account has been deleted.');
    window.location.href = 'index.html';
  } catch (err) {
    alert('Failed to delete account: ' + err.message);
  }
});
</script>

</body>
</html>
